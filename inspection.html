<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pre-Use Inspection</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #003366;
            --accent: #0078d4;
            --success: #28a745;
            --warning: #e6a000;
            --danger: #dc3545;
            --bg: #f0f2f5;
            --white: #ffffff;
            --border: #d0d5dd;
            --text: #1a1a1a;
            --text-light: #667085;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* TOP BAR */
        .topbar {
            background: var(--primary);
            color: var(--white);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .topbar h1 { font-size: 1.05rem; font-weight: 700; }
        .topbar a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.85rem; }
        .topbar a:hover { color: #fff; }

        /* FORM HEADER */
        .form-header {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 20px 0;
        }
        .form-ref {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--accent);
        }
        .form-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            margin: 2px 0 6px;
        }
        .form-desc {
            font-size: 0.82rem;
            color: var(--text-light);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        /* FIELDS */
        .fields {
            max-width: 700px;
            margin: 0 auto;
            padding: 12px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-light);
            margin-bottom: 3px;
        }
        .field input, .field select {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--white);
        }
        .field input:focus, .field select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,120,212,0.12);
        }

        /* STATUS BANNER */
        .status-banner {
            max-width: 700px;
            margin: 12px auto 0;
            padding: 0 20px;
        }
        .status-bar {
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .status-bar.pending { background: #f0f2f5; color: var(--text-light); }
        .status-bar.pass { background: #e6f7ec; color: var(--success); }
        .status-bar.fail { background: #fde8ea; color: var(--danger); }
        .status-counts {
            font-size: 0.78rem;
            font-weight: 400;
        }

        /* CHECKLIST */
        .checklist {
            max-width: 700px;
            margin: 12px auto 0;
            padding: 0 20px;
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
            padding: 14px 0 8px;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 8px;
        }

        .check-item {
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .check-item.pass { border-color: var(--success); }
        .check-item.fail { border-color: var(--danger); }
        .check-item.na { border-color: #ccc; opacity: 0.6; }

        .check-main {
            display: flex;
            align-items: stretch;
        }
        .check-text {
            flex: 1;
            padding: 10px 12px;
        }
        .check-label {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
        }
        .check-detail {
            font-size: 0.78rem;
            color: var(--text-light);
            margin-top: 2px;
            line-height: 1.4;
        }

        .check-buttons {
            display: flex;
            flex-shrink: 0;
        }
        .check-btn {
            width: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: #f8f9fa;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--text-light);
            border-left: 1px solid #eee;
            transition: all 0.15s;
        }
        .check-btn:hover { background: #eef1f5; }
        .check-btn.pass-btn.selected { background: var(--success); color: var(--white); }
        .check-btn.fail-btn.selected { background: var(--danger); color: var(--white); }
        .check-btn.na-btn.selected { background: #999; color: var(--white); }

        /* DEFECT PANEL (shown on Fail) */
        .defect-panel {
            display: none;
            border-top: 1px solid #f0f0f0;
            padding: 10px 12px;
            background: #fffbfb;
        }
        .check-item.fail .defect-panel { display: block; }
        .defect-panel textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #f0c0c0;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
            resize: vertical;
            min-height: 48px;
            background: var(--white);
        }
        .defect-panel textarea:focus {
            outline: none;
            border-color: var(--danger);
        }
        .defect-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--danger);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }
        .photo-btn {
            margin-top: 8px;
            padding: 6px 12px;
            border: 1px dashed var(--border);
            border-radius: 6px;
            background: var(--white);
            font-size: 0.78rem;
            font-family: inherit;
            color: var(--text-light);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .photo-btn:hover { border-color: var(--accent); color: var(--accent); }
        .photo-preview {
            margin-top: 6px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .photo-preview img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        /* SUBMIT BAR */
        .submit-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
        }
        .submit-status { font-size: 0.82rem; color: var(--text-light); }
        .submit-status strong { color: var(--primary); }
        .btn-submit {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            color: var(--white);
            transition: background 0.15s;
        }
        .btn-submit.green { background: var(--success); }
        .btn-submit.green:hover { background: #218838; }
        .btn-submit.red { background: var(--danger); }
        .btn-submit.red:hover { background: #c82333; }
        .btn-submit.grey { background: #aaa; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        /* SUCCESS OVERLAY */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .overlay.show { display: flex; }
        .overlay-card {
            background: var(--white);
            border-radius: 12px;
            padding: 32px 28px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 16px 48px rgba(0,0,0,0.2);
        }
        .overlay-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 14px;
        }
        .overlay-icon.green { background: #e6f7ec; color: var(--success); }
        .overlay-icon.red { background: #fde8ea; color: var(--danger); }
        .overlay-card h3 { font-size: 1.15rem; color: var(--primary); margin-bottom: 6px; }
        .overlay-card p { font-size: 0.88rem; color: var(--text-light); line-height: 1.5; margin-bottom: 16px; }
        .overlay-actions { display: flex; gap: 8px; justify-content: center; }
        .overlay-actions button {
            padding: 9px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-outline { background: var(--white); color: var(--text); border: 1px solid var(--border); }

        /* DEFECT REPORT OVERLAY */
        .report-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
            overflow-y: auto;
        }
        .report-overlay.show { display: flex; }
        .report-card {
            background: var(--white);
            border-radius: 12px;
            padding: 28px 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 16px 48px rgba(0,0,0,0.2);
        }
        .report-card h3 {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .report-subtitle {
            font-size: 0.82rem;
            color: var(--text-light);
            margin-bottom: 16px;
        }

        .report-defect-list {
            margin-bottom: 16px;
        }
        .report-defect-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: #fffbfb;
            border: 1px solid #f0c0c0;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .report-defect-item .rdot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--danger);
            flex-shrink: 0;
        }

        .report-section {
            margin-bottom: 14px;
        }
        .report-section label.section-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .severity-options {
            display: flex;
            gap: 6px;
        }
        .sev-btn {
            flex: 1;
            padding: 8px 6px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            background: var(--white);
            font-size: 0.78rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }
        .sev-btn:hover { border-color: #999; }
        .sev-btn.selected.critical { border-color: var(--danger); background: #fde8ea; color: var(--danger); }
        .sev-btn.selected.moderate { border-color: var(--warning); background: #fff6e0; color: #b07d00; }
        .sev-btn.selected.minor { border-color: var(--success); background: #e6f7ec; color: var(--success); }

        .recipient-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .recipient-list label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text);
            cursor: pointer;
        }
        .recipient-list input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .report-email {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .report-email:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,120,212,0.12);
        }

        .report-actions {
            display: flex;
            gap: 8px;
            margin-top: 18px;
        }
        .report-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }
        .btn-send { background: var(--danger); color: var(--white); flex: 1; }
        .btn-send:hover { background: #c82333; }
        .btn-cancel { background: var(--white); color: var(--text); border: 1px solid var(--border); }

        @media (max-width: 600px) {
            .fields { grid-template-columns: 1fr; }
            .check-btn { width: 44px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1 id="topbar-title">Pre-Use Inspection</h1>
    <a href="inspections.html">&larr; All Inspections</a>
</div>

<div class="form-header">
    <div class="form-ref" id="form-ref"></div>
    <h2 id="form-title"></h2>
    <div class="form-desc" id="form-desc"></div>
</div>

<div class="fields">
    <div class="field">
        <label id="equip-label">Equipment ID / Fleet No.</label>
        <input type="text" id="f-equip" placeholder="Enter ID">
    </div>
    <div class="field">
        <label>Date</label>
        <input type="date" id="f-date">
    </div>
    <div class="field">
        <label>Inspector</label>
        <input type="text" id="f-inspector" placeholder="Name">
    </div>
    <div class="field">
        <label>Location / Project</label>
        <input type="text" id="f-location" value="Enabling Works — Port Talbot">
    </div>
</div>

<div class="status-banner">
    <div class="status-bar pending" id="status-bar">
        <span id="status-text">Complete all checks below</span>
        <span class="status-counts" id="status-counts"></span>
    </div>
</div>

<div class="checklist" id="checklist"></div>

<!-- SUBMIT BAR -->
<div class="submit-bar">
    <div class="submit-status" id="submit-status">0 of 0 checked</div>
    <button class="btn-submit grey" id="btn-submit" disabled onclick="submitInspection()">Submit</button>
</div>

<!-- RESULT OVERLAY (pass inspections) -->
<div class="overlay" id="overlay">
    <div class="overlay-card">
        <div class="overlay-icon" id="overlay-icon"></div>
        <h3 id="overlay-title"></h3>
        <p id="overlay-msg"></p>
        <div class="overlay-actions">
            <button class="btn-outline" onclick="window.location.href='index.html'">Back to Hub</button>
            <button class="btn-primary" onclick="location.reload()">New Inspection</button>
        </div>
    </div>
</div>

<!-- DEFECT REPORT OVERLAY (fail inspections) -->
<div class="report-overlay" id="report-overlay">
    <div class="report-card">
        <h3>Defect Report</h3>
        <p class="report-subtitle" id="report-subtitle"></p>

        <div class="report-defect-list" id="report-defect-list"></div>

        <div class="report-section">
            <label class="section-label">Severity</label>
            <div class="severity-options">
                <button class="sev-btn critical" onclick="selectSeverity('Critical', this)">Critical</button>
                <button class="sev-btn moderate" onclick="selectSeverity('Moderate', this)">Moderate</button>
                <button class="sev-btn minor" onclick="selectSeverity('Minor', this)">Minor</button>
            </div>
        </div>

        <div class="report-section">
            <label class="section-label">Notify</label>
            <div class="recipient-list">
                <label><input type="checkbox" value="Plant Manager" checked> Plant Manager</label>
                <label><input type="checkbox" value="Workshop Supervisor" checked> Workshop Supervisor</label>
                <label><input type="checkbox" value="Site Agent"> Site Agent</label>
                <label><input type="checkbox" value="Safety Officer"> Safety Officer</label>
            </div>
        </div>

        <div class="report-section">
            <label class="section-label">Additional Email (optional)</label>
            <input type="email" class="report-email" id="report-extra-email" placeholder="name@example.com">
        </div>

        <div class="report-actions">
            <button class="btn-cancel" onclick="closeReport()">Cancel</button>
            <button class="btn-send" onclick="sendReport()">Send Report &amp; Log Defect</button>
        </div>
    </div>
</div>

<!-- CONFIRMATION OVERLAY (after sending defect report) -->
<div class="overlay" id="confirm-overlay">
    <div class="overlay-card">
        <div class="overlay-icon green" style="background:#e6f7ec;color:var(--success)">&#10003;</div>
        <h3>Defect Logged &amp; Report Sent</h3>
        <p id="confirm-msg"></p>
        <div class="overlay-actions">
            <button class="btn-outline" onclick="window.location.href='defects.html'">View Defect Tracker</button>
            <button class="btn-primary" onclick="location.reload()">New Inspection</button>
        </div>
    </div>
</div>

<script src="mii-db.js"></script>

// ===== INIT =====
const params = new URLSearchParams(window.location.search);
const formKey = params.get('form') || 'flt';
const form = FORMS[formKey];

if (!form) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;"><h2>Form not found</h2><p>Valid forms: ?form=flt, ?form=telehandler, ?form=oxyfuel</p><a href="index.html">Back to Hub</a></div>';
}

// Populate header
document.title = form.title + ' — MII Engineering';
document.getElementById('topbar-title').textContent = form.ref.split('—')[0].trim();
document.getElementById('form-ref').textContent = form.ref;
document.getElementById('form-title').textContent = form.title;
document.getElementById('form-desc').textContent = form.desc;
document.getElementById('equip-label').textContent = form.equipLabel;
document.getElementById('f-date').valueAsDate = new Date();

// Pre-fill inspector from URL
if (params.get('inspector')) document.getElementById('f-inspector').value = params.get('inspector');

// ===== STATE =====
const itemState = {}; // id -> 'pass' | 'fail' | 'na'
let totalItems = 0;

// ===== BUILD CHECKLIST =====
const container = document.getElementById('checklist');
form.sections.forEach(section => {
    const sDiv = document.createElement('div');
    sDiv.innerHTML = `<div class="section-title">${section.title}</div>`;

    section.items.forEach(item => {
        totalItems++;
        const el = document.createElement('div');
        el.className = 'check-item';
        el.id = 'item-' + item.id;
        el.innerHTML = `
            <div class="check-main">
                <div class="check-text">
                    <div class="check-label">${item.label}</div>
                    <div class="check-detail">${item.detail}</div>
                </div>
                <div class="check-buttons">
                    <button class="check-btn pass-btn" onclick="setCheck('${item.id}','pass')">PASS</button>
                    <button class="check-btn fail-btn" onclick="setCheck('${item.id}','fail')">FAIL</button>
                    <button class="check-btn na-btn" onclick="setCheck('${item.id}','na')">N/A</button>
                </div>
            </div>
            <div class="defect-panel">
                <div class="defect-label">Describe the defect</div>
                <textarea placeholder="What's wrong? What action is needed?"></textarea>
                <label class="photo-btn">
                    <input type="file" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this, '${item.id}')">
                    &#128247; Add Photo
                </label>
                <div class="photo-preview" id="photos-${item.id}"></div>
            </div>
        `;
        sDiv.appendChild(el);
    });
    container.appendChild(sDiv);
});

// ===== CHECK HANDLERS =====
function setCheck(id, status) {
    const prev = itemState[id];
    // Toggle off if clicking same button
    if (prev === status) {
        delete itemState[id];
        updateItem(id, null);
    } else {
        itemState[id] = status;
        updateItem(id, status);
    }
    updateSummary();
}

function updateItem(id, status) {
    const el = document.getElementById('item-' + id);
    el.className = 'check-item' + (status ? ' ' + status : '');
    el.querySelectorAll('.check-btn').forEach(btn => btn.classList.remove('selected'));
    if (status) {
        const cls = status + '-btn';
        el.querySelector('.' + cls)?.classList.add('selected');
    }
}

function previewPhoto(input, id) {
    const container = document.getElementById('photos-' + id);
    if (input.files && input.files[0]) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(input.files[0]);
        container.appendChild(img);
    }
}

// ===== SUMMARY =====
function updateSummary() {
    const checked = Object.keys(itemState).length;
    const passes = Object.values(itemState).filter(s => s === 'pass').length;
    const fails = Object.values(itemState).filter(s => s === 'fail').length;
    const nas = Object.values(itemState).filter(s => s === 'na').length;

    // Submit status
    document.getElementById('submit-status').innerHTML =
        `<strong>${checked}</strong> of ${totalItems} checked`;

    // Status bar
    const bar = document.getElementById('status-bar');
    const allDone = checked === totalItems;

    if (!allDone) {
        bar.className = 'status-bar pending';
        document.getElementById('status-text').textContent = `${totalItems - checked} items remaining`;
    } else if (fails > 0) {
        bar.className = 'status-bar fail';
        document.getElementById('status-text').textContent = `DEFECT FOUND — ${fails} item${fails > 1 ? 's' : ''} failed`;
    } else {
        bar.className = 'status-bar pass';
        document.getElementById('status-text').textContent = 'ALL CHECKS PASSED — Cleared for use';
    }
    document.getElementById('status-counts').textContent =
        `${passes} pass  /  ${fails} fail  /  ${nas} N/A`;

    // Submit button
    const btn = document.getElementById('btn-submit');
    if (!allDone) {
        btn.className = 'btn-submit grey';
        btn.disabled = true;
        btn.textContent = 'Submit';
    } else if (fails > 0) {
        btn.className = 'btn-submit red';
        btn.disabled = false;
        btn.textContent = 'Submit — Defect Found';
    } else {
        btn.className = 'btn-submit green';
        btn.disabled = false;
        btn.textContent = 'Submit — Passed';
    }
}

// ===== LOCALSTORAGE KEYS =====
const DEFECTS_KEY = 'mii_defects';
const INSPECTIONS_KEY = 'mii_inspections';

// ===== EQUIPMENT TYPE FROM FORM KEY =====
function getEquipmentType() {
    if (formKey === 'flt') return 'FLT';
    if (formKey === 'telehandler') return 'Telehandler';
    if (formKey === 'oxyfuel') return 'Oxy-Fuel';
    return 'Other';
}

// Holds the built record between submit and send
let pendingRecord = null;
let selectedSeverity = 'Moderate';

// ===== SUBMIT =====
function submitInspection() {
    const equip = document.getElementById('f-equip').value.trim();
    const inspector = document.getElementById('f-inspector').value.trim();
    if (!equip) { alert('Please enter the equipment ID.'); return; }
    if (!inspector) { alert('Please enter the inspector name.'); return; }

    // Check that all fails have defect notes
    const fails = Object.entries(itemState).filter(([,s]) => s === 'fail');
    for (const [id] of fails) {
        const textarea = document.querySelector('#item-' + id + ' .defect-panel textarea');
        if (textarea && !textarea.value.trim()) {
            alert('Please describe the defect for: ' + document.querySelector('#item-' + id + ' .check-label').textContent);
            textarea.focus();
            return;
        }
    }

    const hasFails = fails.length > 0;

    // Build record
    const record = {
        form: form.ref,
        equipment: equip,
        equipmentType: getEquipmentType(),
        date: document.getElementById('f-date').value,
        inspector,
        location: document.getElementById('f-location').value,
        result: hasFails ? 'FAIL' : 'PASS',
        items: {},
        defects: []
    };

    Object.entries(itemState).forEach(([id, status]) => {
        record.items[id] = status;
        if (status === 'fail') {
            const notes = document.querySelector('#item-' + id + ' .defect-panel textarea')?.value || '';
            const label = document.querySelector('#item-' + id + ' .check-label')?.textContent || id;
            record.defects.push({ item: label, notes });
        }
    });

    console.log('Pre-Use Inspection submitted:', record);

    if (hasFails) {
        // Show defect report overlay
        pendingRecord = record;
        selectedSeverity = 'Moderate';
        showReportOverlay(record);
    } else {
        // PASS — log inspection and show simple overlay
        logInspection(record);

        const icon = document.getElementById('overlay-icon');
        const title = document.getElementById('overlay-title');
        const msg = document.getElementById('overlay-msg');
        icon.className = 'overlay-icon green';
        icon.textContent = '\u2713';
        title.textContent = 'Inspection Passed';
        msg.textContent = `${equip} — all checks passed. Cleared for use by ${inspector}.`;
        document.getElementById('overlay').classList.add('show');
    }
}

// ===== DEFECT REPORT OVERLAY =====
function showReportOverlay(record) {
    document.getElementById('report-subtitle').textContent =
        `${record.equipment} — ${record.defects.length} defect${record.defects.length > 1 ? 's' : ''} found during pre-use inspection`;

    const listEl = document.getElementById('report-defect-list');
    listEl.innerHTML = record.defects.map(d =>
        `<div class="report-defect-item"><span class="rdot"></span><strong>${d.item}</strong>: ${d.notes}</div>`
    ).join('');

    // Reset severity selection to Moderate
    document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('.sev-btn.moderate').classList.add('selected');
    selectedSeverity = 'Moderate';

    document.getElementById('report-overlay').classList.add('show');
}

function selectSeverity(level, btn) {
    selectedSeverity = level;
    document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function closeReport() {
    document.getElementById('report-overlay').classList.remove('show');
}

function sendReport() {
    if (!pendingRecord) return;

    const record = pendingRecord;
    const recipients = [];
    document.querySelectorAll('.recipient-list input[type="checkbox"]:checked').forEach(cb => {
        recipients.push(cb.value);
    });
    const extraEmail = document.getElementById('report-extra-email').value.trim();

    // Log inspection to localStorage
    logInspection(record);

    // Log each defect to localStorage
    const defects = JSON.parse(localStorage.getItem(DEFECTS_KEY) || '[]');
    const now = new Date();
    const timeStr = now.toISOString().split('T')[0] + ' ' + now.toTimeString().slice(0,5);

    record.defects.forEach((d, i) => {
        const defId = 'DEF-' + String(Date.now()).slice(-6) + String(i);
        defects.push({
            id: defId,
            equipment: record.equipment,
            equipmentType: record.equipmentType,
            summary: d.item + ' — ' + d.notes.substring(0, 80),
            description: d.notes,
            severity: selectedSeverity,
            status: 'Open',
            inspector: record.inspector,
            date: record.date,
            assignedTo: '',
            recipients: recipients,
            extraEmail: extraEmail || '',
            notes: [
                { type: 'created', text: 'Defect logged from pre-use inspection (' + record.form + ')', author: record.inspector, time: timeStr }
            ]
        });
    });

    localStorage.setItem(DEFECTS_KEY, JSON.stringify(defects));
    MiiDB.saveAll('defects', defects);

    console.log('Defect report sent to:', recipients, extraEmail ? '+ ' + extraEmail : '');

    // Hide report overlay, show confirmation
    document.getElementById('report-overlay').classList.remove('show');
    document.getElementById('confirm-msg').textContent =
        `${record.defects.length} defect${record.defects.length > 1 ? 's' : ''} logged for ${record.equipment}. ` +
        `Notifications sent to ${recipients.join(', ')}${extraEmail ? ', ' + extraEmail : ''}.`;
    document.getElementById('confirm-overlay').classList.add('show');

    pendingRecord = null;
}

// ===== LOG INSPECTION TO localStorage =====
function logInspection(record) {
    const inspections = JSON.parse(localStorage.getItem(INSPECTIONS_KEY) || '[]');
    inspections.push({
        id: 'INS-' + String(Date.now()).slice(-6),
        equipment: record.equipment,
        equipmentType: record.equipmentType,
        inspector: record.inspector,
        date: record.date,
        result: record.result,
        defectsFound: record.defects.length
    });
    localStorage.setItem(INSPECTIONS_KEY, JSON.stringify(inspections));
    MiiDB.save('inspections', inspections[inspections.length - 1]);
}

// Init
updateSummary();
</script>
