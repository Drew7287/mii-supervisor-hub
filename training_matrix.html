<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MII Engineering — Training Matrix</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #003366;
            --accent: #0078d4;
            --success: #28a745;
            --warning: #e6a000;
            --danger: #dc3545;
            --bg: #f0f2f5;
            --white: #ffffff;
            --border: #d0d5dd;
            --text: #1a1a1a;
            --text-light: #667085;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
        }

        /* TOP BAR */
        .topbar {
            background: var(--primary);
            color: var(--white);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar h1 { font-size: 1.15rem; font-weight: 700; }
        .topbar a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .topbar a:hover { color: #fff; }

        /* CONTENT */
        .content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* STAT CARDS */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat {
            background: var(--white);
            border-radius: 8px;
            padding: 14px 16px;
            box-shadow: var(--shadow);
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s;
        }
        .stat.active { border-color: var(--accent); }
        .stat-val {
            font-size: 1.6rem;
            font-weight: 800;
        }
        .stat-val.total { color: var(--primary); }
        .stat-val.current { color: var(--success); }
        .stat-val.expiring { color: var(--warning); }
        .stat-val.expired { color: var(--danger); }
        .stat-lbl {
            font-size: 0.72rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-top: 2px;
        }

        /* SEARCH + FILTERS */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-family: inherit;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .filter-select {
            padding: 10px 14px;
            font-size: 0.85rem;
            font-family: inherit;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--white);
            outline: none;
            cursor: pointer;
        }
        .result-info {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 10px;
        }
        .badge-ro {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #e8f2fc;
            color: var(--accent);
            margin-left: 8px;
            vertical-align: middle;
        }

        /* EMPLOYEE LIST */
        .emp-list {
            list-style: none;
        }
        .emp-card {
            background: var(--white);
            border-radius: 8px;
            margin-bottom: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .emp-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            gap: 12px;
            transition: background 0.1s;
        }
        .emp-header:hover { background: #f8fafc; }
        .emp-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .emp-info { flex: 1; }
        .emp-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }
        .emp-meta {
            font-size: 0.78rem;
            color: var(--text-light);
        }
        .emp-badges {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .badge.green { background: #e6f7ec; color: var(--success); }
        .badge.amber { background: #fff6e0; color: #b07d00; }
        .badge.red { background: #fde8ea; color: var(--danger); }
        .emp-chevron {
            font-size: 1rem;
            color: var(--border);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .emp-card.open .emp-chevron { transform: rotate(90deg); }

        /* TRAINING DETAIL */
        .emp-detail {
            display: none;
            border-top: 1px solid #f0f2f5;
            padding: 0 16px 14px;
        }
        .emp-card.open .emp-detail { display: block; }

        .training-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            margin-top: 10px;
        }
        .training-table th {
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-light);
            padding: 6px 8px;
            border-bottom: 2px solid var(--border);
        }
        .training-table td {
            padding: 7px 8px;
            border-bottom: 1px solid #f0f2f5;
            vertical-align: middle;
        }
        .training-table tr:last-child td { border-bottom: none; }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.CURRENT { background: var(--success); }
        .status-dot.EXPIRING_SOON { background: var(--warning); }
        .status-dot.EXPIRED { background: var(--danger); }

        .status-text { font-weight: 600; font-size: 0.75rem; }
        .status-text.CURRENT { color: var(--success); }
        .status-text.EXPIRING_SOON { color: var(--warning); }
        .status-text.EXPIRED { color: var(--danger); }

        .cat-tag {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
            background: #f0f2f5;
            color: var(--text-light);
            white-space: nowrap;
        }

        /* PAGINATION */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px 0;
        }
        .page-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--white);
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            color: var(--text);
        }
        .page-btn:hover { background: #f0f7ff; border-color: var(--accent); }
        .page-btn:disabled { opacity: 0.4; cursor: default; }
        .page-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }
        .page-info { font-size: 0.8rem; color: var(--text-light); }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 0.75rem;
            color: var(--text-light);
        }

        @media (max-width: 700px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .emp-badges { display: none; }
        }
    </style>
</head>

<div class="topbar">
    <h1>Training Matrix <span class="badge-ro">Read-Only</span></h1>

<div class="content">

        <div class="stat" onclick="setStatusFilter('CURRENT')" id="stat-current">

        <div class="stat" onclick="setStatusFilter('EXPIRING_SOON')" id="stat-expiring">

        <div class="stat" onclick="setStatusFilter('EXPIRED')" id="stat-expired">
            <div class="stat-val expired" id="sv-expired">—</div>
            <div class="stat-lbl">Expired</div>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <input type="text" class="search-input" id="search" placeholder="Search by name, employee number, or trade..." oninput="applyFilters()">
        <select class="filter-select" id="cat-filter" onchange="applyFilters()">
            <option value="">All Categories</option>
        </select>
        <select class="filter-select" id="type-filter" onchange="applyFilters()">
            <option value="">All Training Types</option>
        </select>
    </div>

    <div class="result-info" id="result-info"></div>

    <!-- EMPLOYEE LIST -->
    <ul class="emp-list" id="emp-list"></ul>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>

</div>

<div class="footer">
    MII Engineering Ltd &mdash; Training Matrix (Read-Only) &mdash; Data synced from RAMSBuilder

4-08-07","cert":""}],"stats":{"CURRENT":1605,"EXPIRED":2375,"EXPIRING_SOON":104}};

// ===== INDEX =====
const empById = {};
DATA.employees.forEach(e => empById[e.id] = e);

const typeById = {};
DATA.types.forEach(t => typeById[t.id] = t);

// Build per-employee training map
const empTraining = {};  // eid -> [records]
DATA.records.forEach(r => {
    if (!empTraining[r.eid]) empTraining[r.eid] = [];
    empTraining[r.eid].push(r);
});

// Per-employee status summary
const empSummary = {};   // eid -> { current, expiring, expired }
DATA.employees.forEach(e => {
    const recs = empTraining[e.id] || [];
    const s = { current: 0, expiring: 0, expired: 0 };
    recs.forEach(r => {
        if (r.status === 'CURRENT') s.current++;
        else if (r.status === 'EXPIRING_SOON') s.expiring++;
        else if (r.status === 'EXPIRED') s.expired++;
    });
    empSummary[e.id] = s;
});

// Categories
const categories = [...new Set(DATA.types.map(t => t.cat))].sort();

// ===== STATE =====
let filteredEmps = [...DATA.employees];
let currentPage = 1;
const PAGE_SIZE = 30;
let statusFilter = '';

// ===== INIT =====
// Populate category filter
const catSel = document.getElementById('cat-filter');
categories.forEach(c => {
    const o = document.createElement('option');
    o.value = c;
    o.textContent = c.replace(/_/g, ' ');
    catSel.appendChild(o);
});

// Populate type filter
const typeSel = document.getElementById('type-filter');
DATA.types.sort((a, b) => a.name.localeCompare(b.name)).forEach(t => {
    const o = document.createElement('option');
    o.value = t.id;
    o.textContent = t.name;
    typeSel.appendChild(o);
});

// Stats
document.getElementById('sv-total').textContent = DATA.employees.length;
document.getElementById('sv-current').textContent = DATA.stats.CURRENT || 0;
document.getElementById('sv-expiring').textContent = DATA.stats.EXPIRING_SOON || 0;
document.getElementById('sv-expired').textContent = DATA.stats.EXPIRED || 0;

// ===== FILTERS =====
function setStatusFilter(s) {
    statusFilter = statusFilter === s ? '' : s;
    document.querySelectorAll('.stat').forEach(el => el.classList.remove('active'));
    if (statusFilter) {
        const map = { 'CURRENT': 'stat-current', 'EXPIRING_SOON': 'stat-expiring', 'EXPIRED': 'stat-expired' };
        document.getElementById(map[statusFilter])?.classList.add('active');
    }
    applyFilters();
}

function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const cat = document.getElementById('cat-filter').value;
    const typeId = document.getElementById('type-filter').value;

    filteredEmps = DATA.employees.filter(e => {
        // Text search
        if (q) {
            const hay = (e.name + ' ' + e.num + ' ' + e.trade).toLowerCase();
            if (!q.split(/\s+/).every(t => hay.includes(t))) return false;
        }

        const recs = empTraining[e.id] || [];
        if (recs.length === 0) return false;

        // Status filter
        if (statusFilter) {
            const hasStatus = recs.some(r => r.status === statusFilter);
            if (!hasStatus) return false;
        }

        // Category filter
        if (cat) {
            const hasCategory = recs.some(r => {
                const t = typeById[r.tid];
                return t && t.cat === cat;
            });
            if (!hasCategory) return false;
        }

        // Type filter
        if (typeId) {
            const hasType = recs.some(r => r.tid === typeId);
            if (!hasType) return false;
        }

        return true;
    });

    currentPage = 1;
    render();
}

// ===== RENDER =====
function render() {
    const list = document.getElementById('emp-list');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page = filteredEmps.slice(start, start + PAGE_SIZE);

    list.innerHTML = '';
    page.forEach(e => {
        const s = empSummary[e.id];
        const li = document.createElement('li');
        li.className = 'emp-card';
        li.id = 'emp-' + e.id;

        const initials = e.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        const meta = [e.num, e.trade].filter(Boolean).join(' — ');

        let badges = '';
        if (s.current) badges += `<span class="badge green">${s.current} current</span>`;
        if (s.expiring) badges += `<span class="badge amber">${s.expiring} expiring</span>`;
        if (s.expired) badges += `<span class="badge red">${s.expired} expired</span>`;

        li.innerHTML = `
            <div class="emp-header" onclick="toggleEmp('${e.id}')">
                <div class="emp-avatar">${initials}</div>
                <div class="emp-info">
                    <div class="emp-name">${e.name}</div>
                    <div class="emp-meta">${meta}</div>
                </div>
                <div class="emp-badges">${badges}</div>
                <div class="emp-chevron">&#9654;</div>
            </div>
            <div class="emp-detail" id="detail-${e.id}"></div>
        `;
        list.appendChild(li);
    });

    // Result info
    document.getElementById('result-info').textContent =
        `Showing ${start + 1}–${Math.min(start + PAGE_SIZE, filteredEmps.length)} of ${filteredEmps.length} employees`;

    renderPagination();
}

function toggleEmp(eid) {
    const card = document.getElementById('emp-' + eid);
    const detail = document.getElementById('detail-' + eid);
    const isOpen = card.classList.contains('open');

    if (isOpen) {
        card.classList.remove('open');
        return;
    }

    card.classList.add('open');

    // Build detail if empty
    if (!detail.innerHTML) {
        const recs = (empTraining[eid] || []).slice();
        // Sort: expiring first, then current, then expired
        const order = { 'EXPIRING_SOON': 0, 'CURRENT': 1, 'EXPIRED': 2 };
        recs.sort((a, b) => (order[a.status] ?? 3) - (order[b.status] ?? 3));

        let html = `<table class="training-table">
            <thead><tr>
                <th>Status</th><th>Training</th><th>Category</th><th>Achieved</th><th>Expiry</th><th>Cert #</th>
            </tr></thead><tbody>`;

        recs.forEach(r => {
            const t = typeById[r.tid];
            if (!t) return;
            const statusLabel = r.status === 'EXPIRING_SOON' ? 'Expiring' : r.status === 'CURRENT' ? 'Current' : 'Expired';
            html += `<tr>
                <td><span class="status-dot ${r.status}"></span><span class="status-text ${r.status}">${statusLabel}</span></td>
                <td style="font-weight:500">${t.name}</td>
                <td><span class="cat-tag">${t.cat.replace(/_/g, ' ')}</span></td>
                <td>${formatDate(r.ach)}</td>
                <td>${formatDate(r.exp)}</td>
                <td style="color:var(--text-light);font-size:0.78rem">${r.cert || '—'}</td>
            </tr>`;
        });

        html += '</tbody></table>';
        detail.innerHTML = html;
    }
}

function formatDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ===== PAGINATION =====
function renderPagination() {
    const totalPages = Math.ceil(filteredEmps.length / PAGE_SIZE);
    const container = document.getElementById('pagination');
    if (totalPages <= 1) { container.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&laquo; Prev</button>`;

    // Show max 7 page buttons
    let pages = [];
    if (totalPages <= 7) {
        for (let i = 1; i <= totalPages; i++) pages.push(i);
    } else {
        pages = [1];
        if (currentPage > 3) pages.push('...');
        for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pages.push(i);
        if (currentPage < totalPages - 2) pages.push('...');
        pages.push(totalPages);
    }

    pages.forEach(p => {
        if (p === '...') {
            html += `<span class="page-info">...</span>`;
        } else {
            html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
        }
    });

    html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next &raquo;</button>`;
    container.innerHTML = html;
}

function goPage(p) {
    const totalPages = Math.ceil(filteredEmps.length / PAGE_SIZE);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Initial render
applyFilters();
</script>
