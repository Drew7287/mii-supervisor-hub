<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MII Engineering — Safe Systems of Work</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #003366;
            --primary-light: #004d99;
            --accent: #0078d4;
            --success: #28a745;
            --warning: #e6a000;
            --danger: #dc3545;
            --bg: #f0f2f5;
            --white: #ffffff;
            --border: #d0d5dd;
            --text: #1a1a1a;
            --text-light: #667085;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            background: var(--primary);
            color: var(--white);
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar h1 { font-size: 1.2rem; font-weight: 700; }
        .topbar a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.15s;
        }
        .topbar a:hover { color: #fff; }

        /* ===== CONTENT ===== */
        .content {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .page-subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        /* ===== SEARCH BAR ===== */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-family: inherit;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: #aab4c0; }

        .result-count {
            font-size: 0.8rem;
            color: var(--text-light);
            padding: 4px 0 8px;
        }

        /* ===== LETTER GROUP ===== */
        .letter-group {
            margin-bottom: 20px;
        }
        .letter-header {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--white);
            background: var(--primary);
            padding: 5px 14px;
            border-radius: 6px 6px 0 0;
            letter-spacing: 0.5px;
        }

        /* ===== SSW LIST ===== */
        .ssw-list {
            list-style: none;
            background: var(--white);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 6px 6px;
            overflow: hidden;
        }
        .ssw-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid #f0f2f5;
            transition: background 0.1s;
            text-decoration: none;
            color: inherit;
            gap: 12px;
        }
        .ssw-item:last-child { border-bottom: none; }
        .ssw-item:hover { background: #f5f8fc; }

        .ssw-ref {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            background: #e8f2fc;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            min-width: 46px;
            text-align: center;
        }
        .ssw-title {
            flex: 1;
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--text);
        }
        .ssw-rev {
            font-size: 0.75rem;
            color: var(--text-light);
            white-space: nowrap;
        }
        .ssw-icon {
            font-size: 1rem;
            color: var(--danger);
            opacity: 0.6;
        }
        .ssw-open {
            font-size: 0.75rem;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.15s;
            white-space: nowrap;
        }
        .ssw-item:hover .ssw-open { opacity: 1; }

        /* ===== LETTER NAV ===== */
        .letter-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 18px;
        }
        .letter-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            background: var(--white);
            color: var(--primary);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
            text-decoration: none;
        }
        .letter-btn:hover { background: var(--primary); color: var(--white); }
        .letter-btn.disabled {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        /* ===== HIDDEN ===== */
        .hidden { display: none !important; }

        /* ===== TOOLBOX TALK LINK ===== */
        .tbt-link {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .tbt-link a {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .tbt-link span {
            font-size: 0.82rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <div class="topbar">
        <h1>Safe Systems of Work — Toolbox Talks</h1>
        <a href="index.html">&larr; Back to Hub</a>
    </div>

    <div class="content">

        <div class="page-title">SSW Library</div>
        <div class="page-subtitle">Select a topic to open the toolbox talk PDF on SharePoint. Use search to filter by keyword or reference code.</div>

        <div class="tbt-link">
            <span style="font-size:1.2rem;">&#128203;</span>
            <div>
                <a href="https://miiengineering.sharepoint.com/sites/IMS/Shared%20Documents/Forms/AllItems.aspx?id=%2Fsites%2FIMS%2FShared%20Documents%2FSafe%20Systems%20of%20Work%20%28Toolbox%20Talks%29&viewid=67c8993b%2D6667%2D448b%2D9e58%2D34d65a2d7e80" target="_blank">SF 012B — Toolbox Talk Acknowledgement Form</a>
                <br><span>Use this form to record attendance after delivering a toolbox talk</span>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="search-bar">
            <input type="text" class="search-input" id="search" placeholder="Search by topic, ref code, or keyword... e.g. crane, H04, working at height" oninput="filterSSW()" />
        </div>

        <div class="letter-nav" id="letter-nav"></div>

        <div class="result-count" id="result-count"></div>

        ["S14", "Safety Harnesses — Fall Restraint & Fall Arrest", "Rev 0", "SSW(S14) (Rev 0) Safety Harnesses - Fall Restraint & Fall Arrest.pdf"],

        ["V03", "Vibration", "Rev 4", "SSW(V03) (Rev 4) Vibration.pdf"],
        ["W02", "Waste Management", "Rev 3", "SSW(W02) (Rev 3) Waste Management.pdf"],
        ["W04", "Working at Height", "Rev 6", "SSW(W04) (Rev 6) Working at Height.pdf"],
        ["W06", "Waste Minimisation", "Rev 1", "SSW(W06) (Rev1) Waste Minimisation.pdf"],
        ["W07", "Workshop Safety", "Rev 1", "SSW(W07) (Rev1) Workshop Safety.pdf"],
        ["W08", "Weil's Disease", "Rev 1", "SSW(W08) (Rev1) Weil's Desease.pdf"],
        ["W09", "Water Efficiency", "Rev 0", "SSW(W09) (Rev 0) Water Efficiency.pdf"],
        ["W10", "Working Parties in Close Proximity", "Rev 0", "SSW(W10) (Rev 0) Working Parties in Close Proximity.pdf"]
    ];

    const container = document.getElementById('ssw-container');
    const searchInput = document.getElementById('search');
    const countEl = document.getElementById('result-count');
    const navEl = document.getElementById('letter-nav');

    // Get unique letters
    const letters = [...new Set(SSW_DATA.map(s => s[0][0]))].sort();

    // Build letter nav
    'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
        const a = document.createElement('a');
        a.className = 'letter-btn' + (letters.includes(l) ? '' : ' disabled');
        a.textContent = l;
        a.href = '#group-' + l;
        a.onclick = function(e) {
            if (this.classList.contains('disabled')) { e.preventDefault(); return; }
            // Clear search to show all
            searchInput.value = '';
            filterSSW();
        };
        navEl.appendChild(a);
    });

    function buildURL(filename) {
        return SP_BASE + encodeURIComponent(filename);
    }

    function render(data) {
        container.innerHTML = '';
        // Group by first letter of ref
        const groups = {};
        data.forEach(s => {
            const letter = s[0][0];
            if (!groups[letter]) groups[letter] = [];
            groups[letter].push(s);
        });

        const sortedLetters = Object.keys(groups).sort();
        sortedLetters.forEach(letter => {
            const div = document.createElement('div');
            div.className = 'letter-group';
            div.id = 'group-' + letter;

            const header = document.createElement('div');
            header.className = 'letter-header';
            header.textContent = letter;
            div.appendChild(header);

            const ul = document.createElement('ul');
            ul.className = 'ssw-list';

            groups[letter].forEach(([ref, title, rev, filename]) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.className = 'ssw-item';
                a.href = buildURL(filename);
                a.target = '_blank';
                a.innerHTML = `
                    <span class="ssw-ref">${ref}</span>
                    <span class="ssw-title">${title}</span>
                    <span class="ssw-rev">${rev}</span>
                    <span class="ssw-icon">&#128196;</span>
                    <span class="ssw-open">Open on SharePoint &rarr;</span>
                `;
                li.appendChild(a);
                ul.appendChild(li);
            });

            div.appendChild(ul);
            container.appendChild(div);
        });

        countEl.textContent = data.length + ' of ' + SSW_DATA.length + ' toolbox talks';
    }

    function filterSSW() {
        const q = searchInput.value.toLowerCase().trim();
        if (!q) {
            render(SSW_DATA);
            return;
        }
        const terms = q.split(/\s+/);
        const filtered = SSW_DATA.filter(([ref, title, rev]) => {
            const haystack = (ref + ' ' + title + ' ' + rev).toLowerCase();
            return terms.every(t => haystack.includes(t));
        });
        render(filtered);
    }

    // Initial render
    render(SSW_DATA);
</script>
