<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Tracker — MII Engineering</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #003366;
            --primary-light: #004d99;
            --accent: #003087;
            --success: #28a745;
            --warning: #e6a000;
            --danger: #dc3545;
            --bg: #f0f2f5;
            --white: #ffffff;
            --border: #d0d5dd;
            --text: #1a1a1a;
            --text-light: #667085;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.14);

            --cost-positive: #006600;
            --cost-negative: #CC0000;
            --cost-caution: #E68A00;
            --cost-purple: #8e44ad;
            --bg-green: #C6EFCE;
            --bg-red: #FFC7CE;
            --bg-amber: #FFEB9C;
            --bg-purple: #E2D0F0;
            --bg-grey: #F2F2F2;
            --cat-1: #2F5496;
            --cat-2: #C8102E;
            --cat-3: #E68A00;
            --cat-4: #7B2D8E;
            --cat-5: #1a8a6a;
            --cat-6: #34495e;
            --cat-7: #2E7D32;
            --cat-8: #D35400;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
        }

        /* ===== HEADER BAR ===== */
        .header-bar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .back-btn:hover { text-decoration: underline; }
        .header-info { flex: 1; min-width: 0; }
        .header-title {
            font-size: 14pt;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-subtitle {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 1px;
        }
        .status-badge {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 14px;
            border-radius: 12px;
            color: var(--white);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .status-badge.active { background: #006600; }
        .status-badge.complete { background: #2F5496; }
        .status-badge.on_hold { background: #E68A00; }
        .status-badge.archived { background: #9E9E9E; }

        /* ===== TAB BAR ===== */
        .tabs {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            background: var(--white);
            overflow-x: auto;
        }
        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: none;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: inherit;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* ===== CONTENT AREA ===== */
        .content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px 48px;
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ===== LOADING OVERLAY ===== */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 600;
        }
        .loading-overlay.hidden { display: none; }
        .loading-overlay::before {
            content: '';
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== STAT CARDS ===== */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }
        .stat-card {
            background: var(--white);
            border-radius: 8px;
            padding: 14px 16px;
            box-shadow: var(--shadow);
            text-align: center;
            border-top: 3px solid var(--border);
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
        }
        .stat-label {
            font-size: 0.68rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-top: 2px;
        }

        /* ===== SECTION HEADINGS ===== */
        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary);
            margin: 24px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .section-title:first-child { margin-top: 0; }

        /* ===== TABLES ===== */
        .table-wrap {
            overflow-x: auto;
            background: var(--white);
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .table-wrap.scrollable {
            overflow-y: auto;
            max-height: calc(100vh - 220px);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 700px;
        }
        thead th {
            background: #f8f9fa;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--text-light);
            padding: 10px 10px;
            text-align: left;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        thead th.r { text-align: right; }
        thead th.c { text-align: center; }
        tbody td {
            padding: 8px 10px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }
        tbody td.r { text-align: right; font-variant-numeric: tabular-nums; }
        tbody td.c { text-align: center; }
        tbody td.mono { font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.78rem; }
        tbody tr:hover { background: #fafbfc; }
        tbody tr.total-row {
            font-weight: 700;
            background: #f8f9fa;
            border-top: 2px solid var(--border);
        }
        tbody tr.total-row td { padding: 10px 10px; }

        /* Cell coloring */
        .bg-green { background: var(--bg-green); }
        .bg-red { background: var(--bg-red); }
        .bg-amber { background: var(--bg-amber); }
        .bg-purple { background: var(--bg-purple); }
        .bg-grey { background: var(--bg-grey); }
        .text-pos { color: var(--cost-positive); }
        .text-neg { color: var(--cost-negative); }
        .text-caution { color: var(--cost-caution); }
        .text-purple { color: var(--cost-purple); }
        .text-green { color: var(--cost-positive); }
        .text-red { color: var(--cost-negative); }
        .text-bold { font-weight: 700; }

        /* Category dot */
        .cat-dot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            color: var(--white);
            font-size: 0.65rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Risk/Status pills */
        .risk-pill {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .risk-pill.high { background: var(--bg-red); color: var(--cost-negative); }
        .risk-pill.medium { background: var(--bg-amber); color: #8a6d00; }
        .risk-pill.low { background: var(--bg-green); color: var(--cost-positive); }
        .risk-pill.unbudgeted { background: var(--bg-purple); color: var(--cost-purple); }
        .risk-pill.na { background: var(--bg-grey); color: var(--text-light); }
        .risk-pill.over { background: var(--bg-red); color: var(--cost-negative); }
        .risk-pill.at-risk { background: var(--bg-amber); color: #8a6d00; }
        .risk-pill.ok { background: var(--bg-green); color: var(--cost-positive); }
        .risk-pill.critical { background: var(--bg-red); color: var(--cost-negative); }
        .risk-pill.warning { background: var(--bg-amber); color: #8a6d00; }

        /* Forecast grid */
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .forecast-card {
            background: var(--white);
            border-radius: 8px;
            padding: 14px 16px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .forecast-value {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .forecast-label {
            font-size: 0.68rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-top: 2px;
        }

        /* Alert box */
        .alert-box {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-box.purple {
            background: var(--bg-purple);
            color: var(--cost-purple);
            border: 1px solid #c9a0dc;
        }

        /* Margin summary grid */
        .margin-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        /* Filter row */
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 12px;
        }
        .filter-row select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.82rem;
            font-family: inherit;
            background: var(--white);
        }
        .filter-row select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,48,135,0.12);
        }
        .filter-count {
            margin-left: auto;
            font-size: 0.78rem;
            color: var(--text-light);
            font-weight: 600;
        }

        /* Inline category dropdown */
        .cat-assign {
            cursor: pointer;
            text-decoration: underline dotted;
        }
        .cat-assign:hover { color: var(--accent); }
        .cat-inline-select {
            font-size: 0.78rem;
            padding: 2px 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: inherit;
            width: 100%;
            background: #fff;
        }
        .cat-inline-select:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(0,120,212,.15);
        }

        /* ===== GROUPED JOBS PANEL ===== */
        .grouped-jobs-panel {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 24px 0;
            display: none;
        }
        .grouped-jobs-panel.visible { display: block; }
        .grouped-jobs-bar {
            background: #EBF5FF;
            border: 1px solid #B3D7FF;
            border-radius: 8px;
            padding: 12px 16px;
        }
        .grouped-jobs-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .grouped-jobs-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .grouped-job-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 10px;
            background: var(--white);
            border-radius: 5px;
            font-size: 0.82rem;
        }
        .grouped-job-row .job-info {
            flex: 1;
            min-width: 0;
        }
        .grouped-job-row .job-no {
            font-weight: 700;
            color: var(--primary);
        }
        .grouped-job-row .job-name {
            color: var(--text-light);
            margin-left: 6px;
        }
        .grouped-job-row .job-spend {
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            white-space: nowrap;
        }
        .grouped-job-row .btn-ungroup {
            padding: 3px 10px;
            font-size: 0.72rem;
            font-weight: 600;
            font-family: inherit;
            border: 1px solid var(--danger);
            color: var(--danger);
            background: var(--white);
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        .grouped-job-row .btn-ungroup:hover {
            background: #fff5f5;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .stat-row { grid-template-columns: repeat(3, 1fr); }
            .forecast-grid { grid-template-columns: repeat(2, 1fr); }
            .margin-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .stat-row { grid-template-columns: repeat(2, 1fr); }
            .header-bar { flex-wrap: wrap; gap: 8px; }
            .tabs { padding: 0 12px; }
            .tab-btn { padding: 10px 14px; font-size: 0.75rem; }
            .content { padding: 12px 12px 48px; }
            .grouped-jobs-panel { padding: 10px 12px 0; }
        }
    </style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading-overlay">Loading...</div>

<!-- HEADER BAR -->
<div class="header-bar">
    <a href="cost_dashboard.html" class="back-btn">&larr; Back</a>
    <div class="header-info">
        <div class="header-title" id="hdr-title">--</div>
        <div class="header-subtitle" id="hdr-subtitle">--</div>
    </div>
    <span class="status-badge" id="hdr-status">--</span>
    <button onclick="document.getElementById('job-import-file').click()" style="margin-left:12px;padding:6px 14px;background:#0078d4;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.82rem;font-family:inherit;font-weight:600">Import Transactions</button>
    <input type="file" id="job-import-file" accept=".xlsx,.csv" style="display:none">
</div>

<!-- GROUPED JOBS (shown for group parents) -->
<div class="grouped-jobs-panel" id="grouped-jobs-panel">
    <div class="grouped-jobs-bar">
        <div class="grouped-jobs-title">Grouped Jobs</div>
        <div class="grouped-jobs-list" id="grouped-jobs-list"></div>
    </div>
</div>

<!-- TAB BAR -->
<div class="tabs">
    <button class="tab-btn active" data-tab="0">Project Dashboard</button>
    <button class="tab-btn" data-tab="1">Cost Summary</button>
    <button class="tab-btn" data-tab="2">Spend Analysis</button>
    <button class="tab-btn" data-tab="3">All Transactions</button>
    <button class="tab-btn" data-tab="4">Weekly Summary</button>
    <button class="tab-btn" data-tab="5">Estimate</button>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- TAB 0: PROJECT DASHBOARD -->
    <div class="tab-panel active" id="tab-0"></div>

    <!-- TAB 1: COST SUMMARY -->
    <div class="tab-panel" id="tab-1"></div>

    <!-- TAB 2: SPEND ANALYSIS -->
    <div class="tab-panel" id="tab-2"></div>

    <!-- TAB 3: ALL TRANSACTIONS -->
    <div class="tab-panel" id="tab-3"></div>

    <!-- TAB 4: WEEKLY SUMMARY -->
    <div class="tab-panel" id="tab-4"></div>

    <!-- TAB 5: ESTIMATE -->
    <div class="tab-panel" id="tab-5"></div>

</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="mii-db.js"></script>
<script src="cost_db.js"></script>
<script>
// ===== ADMIN-ONLY ACCESS CHECK =====
(function checkAccess() {
    const userJson = localStorage.getItem('mii_user');
    const token = localStorage.getItem('mii_token');
    if (!token || !userJson) { location.href = 'hub.html'; return; }
    const user = JSON.parse(userJson);
    if (user.role !== 'ADMIN') { location.href = 'hub.html'; return; }
})();

// ===== GLOBALS =====
const CAT_COLORS = {
    1:'#2F5496', 2:'#C8102E', 3:'#E68A00', 4:'#7B2D8E',
    5:'#1a8a6a', 6:'#34495e', 7:'#2E7D32', 8:'#D35400'
};
const CAT_NAMES = {
    1:'Design', 2:'Labour', 3:'Plant & Equipment', 4:'Equipment Hired',
    5:'Materials', 6:'Off Site', 7:'Consumables', 8:'Travel & Accommodation'
};

let _jobId = null;
let _data = null;          // cached analysis data
let _tabLoaded = [false, false, false, false, false, false];
let _tabDirty  = [true, true, true, true, true, true];

// ===== HELPERS =====
function esc(s) {
    if (s == null) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
}

function fmt(val, forceDecimals) {
    if (val == null || isNaN(val)) return '--';
    const n = Number(val);
    const abs = Math.abs(n);
    const sign = n < 0 ? '-' : '';
    const hasDecimals = forceDecimals || (abs % 1 !== 0);
    const formatted = abs.toLocaleString('en-GB', {
        minimumFractionDigits: hasDecimals ? 2 : 0,
        maximumFractionDigits: 2
    });
    return sign + '\u00A3' + formatted;
}

function pct(val) {
    if (val == null || isNaN(val)) return '--';
    return Number(val).toFixed(1) + '%';
}

function signedFmt(val) {
    if (val == null || isNaN(val)) return '--';
    const n = Number(val);
    const prefix = n > 0 ? '+' : '';
    return prefix + fmt(n);
}

function catDot(catNum) {
    const color = CAT_COLORS[catNum] || '#999';
    return '<span class="cat-dot" style="background:' + color + '">' + catNum + '</span>';
}

function catName(catNum) {
    return CAT_NAMES[catNum] || 'Category ' + catNum;
}

function pctBgClass(val, hasNoBudget) {
    if (hasNoBudget) return 'bg-purple';
    if (val > 90) return 'bg-red';
    if (val >= 70) return 'bg-amber';
    if (val > 0) return 'bg-green';
    return 'bg-grey';
}

function valColor(val) {
    if (val == null) return '';
    return Number(val) < 0 ? 'text-neg' : (Number(val) > 0 ? 'text-pos' : '');
}

function riskFlag(exposure, atCost) {
    if (!atCost || atCost === 0) {
        return exposure > 0
            ? '<span class="risk-pill unbudgeted">UNBUDGETED</span>'
            : '<span class="risk-pill na">N/A</span>';
    }
    const ratio = exposure / atCost;
    if (ratio > 1) return '<span class="risk-pill high">HIGH</span>';
    if (ratio > 0.8) return '<span class="risk-pill medium">MEDIUM</span>';
    return '<span class="risk-pill low">LOW</span>';
}

function statusPill(text, cls) {
    return '<span class="risk-pill ' + cls + '">' + text + '</span>';
}

function fmtDate(d) {
    if (!d) return '--';
    try {
        const dt = new Date(d);
        return dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch(e) { return d; }
}

function getJobIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
}

// ===== TAB SWITCHING =====
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const idx = parseInt(this.dataset.tab);
        switchTab(idx);
    });
});

function switchTab(idx) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.tab-btn[data-tab="' + idx + '"]').classList.add('active');
    document.getElementById('tab-' + idx).classList.add('active');

    if (_data && (!_tabLoaded[idx] || _tabDirty[idx])) {
        renderTab(idx);
        _tabLoaded[idx] = true;
        _tabDirty[idx] = false;
    }
}

// ===== DATA LOADING =====
async function init() {
    _jobId = getJobIdFromUrl();
    if (!_jobId) {
        window.location.href = 'cost_dashboard.html';
        return;
    }

    // Stale-while-revalidate: show cached data instantly, fetch fresh in background
    var cacheKey = 'cost_job_' + _jobId;
    var shown = false;

    // 1. Show cached data immediately (< 5ms)
    try {
        var cached = localStorage.getItem(cacheKey);
        if (cached) {
            var parsed = JSON.parse(cached);
            if (parsed && parsed.id) {
                _data = { job: parsed };
                populateHeader(_data.job);
                renderTab(0);
                _tabLoaded[0] = true;
                _tabDirty[0] = false;
                document.getElementById('loading-overlay').classList.add('hidden');
                shown = true;
            }
        }
    } catch (e) {}

    // 2. Fetch fresh from server (with 10s timeout for cold starts)
    var token = localStorage.getItem('mii_token');
    if (token) {
        try {
            var resp = await fetch(MII_API + '/cost/jobs/' + encodeURIComponent(_jobId), {
                headers: { 'Authorization': 'Bearer ' + token },
                signal: AbortSignal.timeout ? AbortSignal.timeout(10000) : undefined,
            });
            if (resp.ok) {
                var job = await resp.json();
                if (job && job.id) {
                    _data = { job: job };
                    // Update cache for next visit
                    try { localStorage.setItem(cacheKey, JSON.stringify(job)); } catch (e) {}
                    // Re-render with fresh data
                    _tabDirty = [true, true, true, true, true, true];
                    _tabLoaded = [false, false, false, false, false, false];
                    populateHeader(_data.job);
                    renderTab(document.querySelector('.tab-btn.active') ? (document.querySelector('.tab-btn.active').dataset.tab | 0) : 0);
                    _tabLoaded[0] = true;
                    _tabDirty[0] = false;
                    document.getElementById('loading-overlay').classList.add('hidden');
                    shown = true;
                }
            }
        } catch (e) {
            console.warn('Server fetch failed:', e.message);
        }
    }

    // 3. If nothing worked, try IndexedDB as last resort
    if (!shown) {
        try {
            _data = await CostDB.getFullAnalysis(_jobId);
            if (_data && _data.job) {
                populateHeader(_data.job);
                renderTab(0);
                _tabLoaded[0] = true;
                _tabDirty[0] = false;
                document.getElementById('loading-overlay').classList.add('hidden');
                shown = true;
            }
        } catch (e) {}
    }

    if (!shown) {
        document.getElementById('loading-overlay').innerHTML = 'Job not found. <a href="cost_dashboard.html" style="color:var(--accent)">Back to dashboard</a>';
    }
}

function populateHeader(job) {
    document.getElementById('hdr-title').textContent = job.job_name || '--';
    document.getElementById('hdr-subtitle').textContent =
        (job.job_number || '') + (job.client ? ' \u2014 ' + job.client : '') +
        (job.is_group ? ' (Group)' : '');
    const badge = document.getElementById('hdr-status');
    const status = (job.status || 'active').toLowerCase().replace(/\s+/g, '_');
    badge.textContent = (job.status || 'Active').toUpperCase();
    badge.className = 'status-badge ' + status;
    document.title = (job.job_name || 'Cost Tracker') + ' \u2014 MII Engineering';

    // Show grouped jobs panel if this is a group parent
    loadGroupedJobs(job);
}

// ===== GROUPED JOBS (for group parents) =====
async function loadGroupedJobs(job) {
    var panel = document.getElementById('grouped-jobs-panel');
    var list = document.getElementById('grouped-jobs-list');

    if (!job.is_group) {
        panel.classList.remove('visible');
        return;
    }

    try {
        // Try to load children from server first, fall back to local
        var children = [];
        var token = localStorage.getItem('mii_token');
        if (token) {
            var resp = await fetch(MII_API + '/cost/jobs', {
                headers: { 'Authorization': 'Bearer ' + token },
            });
            if (resp.ok) {
                var data = await resp.json();
                children = (data.jobs || []).filter(function(j) { return j.group_id === job.id; });
            }
        }
        // Fallback to local DB
        if (children.length === 0) {
            children = await CostDB.getGroupChildren(job.id);
        }

        if (children.length === 0) {
            panel.classList.remove('visible');
            return;
        }

        var html = '';
        children.forEach(function(child) {
            var spend = parseFloat(child.total_actual || child.total_exposure || 0);
            html += '<div class="grouped-job-row">' +
                '<div class="job-info">' +
                    '<span class="job-no">' + esc(child.job_number || '') + '</span>' +
                    '<span class="job-name">' + esc(child.job_name || '') + '</span>' +
                '</div>' +
                '<span class="job-spend">' + fmt(spend) + '</span>' +
                '<button class="btn-ungroup" onclick="ungroupJob(\'' + esc(child.id) + '\', \'' + esc(child.job_number || '') + '\')">Ungroup</button>' +
                '</div>';
        });

        list.innerHTML = html;
        panel.classList.add('visible');
    } catch (err) {
        console.error('Failed to load grouped jobs:', err);
        panel.classList.remove('visible');
    }
}

async function ungroupJob(childId, childJobNumber) {
    if (!confirm('Remove ' + childJobNumber + ' from this group?\n\nIt will appear as a standalone job on the dashboard.')) {
        return;
    }

    try {
        await CostDB.removeJobFromGroup(childId);

        // Reload job data to refresh the header and grouped jobs panel
        _data = await CostDB.getFullAnalysis(_jobId);
        if (_data && _data.job) {
            populateHeader(_data.job);
            _tabDirty = [true, true, true, true, true, true];
            _tabLoaded = [false, false, false, false, false, false];
            var activeTab = document.querySelector('.tab-btn.active');
            renderTab(activeTab ? parseInt(activeTab.dataset.tab) : 0);
        }
        alert(childJobNumber + ' has been ungrouped.');
    } catch (err) {
        console.error('Ungroup error:', err);
        alert('Failed to ungroup: ' + err.message);
    }
}

// ===== RENDER DISPATCHER =====
function renderTab(idx) {
    switch(idx) {
        case 0: renderDashboard(); break;
        case 1: renderCostSummary(); break;
        case 2: renderSpendAnalysis(); break;
        case 3: renderTransactions(); break;
        case 4: renderWeeklySummary(); break;
        case 5: renderEstimate(); break;
    }
}

// ===== CATEGORY HELPERS =====
function getCatBudget(c) { return parseFloat(c.at_cost) || 0; }
function getCatContract(c) { return parseFloat(c.contract_value) || 0; }
function getCatName(c) { return c.category_name || catName(c.category_number); }

// ===== TAB 0: PROJECT DASHBOARD =====
function renderDashboard() {
    const d = _data;
    const job = d.job;
    const cats = d.categories || [];
    const totals = d.totals || {};

    const budget = totals.budget_at_cost || job.total_at_cost || 0;
    const contract = totals.contract_value || job.total_contract || 0;
    const spent = totals.actual_spend || job.total_actual || 0;
    const committed = totals.committed || job.total_committed || 0;
    const exposure = totals.total_exposure || job.total_exposure || (spent + committed);
    const budgetRemaining = budget - exposure;
    const marginRemaining = contract - exposure;
    const pctSpent = budget > 0 ? (spent / budget) * 100 : 0;
    const revenue = totals.total_revenue || job.total_revenue || 0;

    let html = '';

    // Row 1 stat cards
    html += '<div class="stat-row">';
    html += statCard(fmt(budget), 'Budget (At Cost)', '#2F5496');
    html += statCard(fmt(contract), 'Contract Value', '#003087');
    html += statCard(fmt(spent), 'Spent (Actual)', '#CC0000');
    html += statCard(fmt(committed), 'Committed', '#E68A00');
    html += statCard(fmt(exposure), 'Total Exposure', '#CC0000');
    html += '</div>';

    // Row 2 stat cards
    html += '<div class="stat-row">';
    html += statCard(fmt(budgetRemaining), 'Budget Remaining', budgetRemaining >= 0 ? '#006600' : '#CC0000');
    html += statCard(fmt(marginRemaining), 'Margin Remaining', marginRemaining >= 0 ? '#003087' : '#CC0000');
    html += statCard(pct(pctSpent), '% Spent', '#E68A00');
    html += statCard(fmt(revenue), 'Revenue (Billed)', '#006600');
    html += '<div></div>'; // empty 5th slot
    html += '</div>';

    // Category Risk Analysis
    html += '<h3 class="section-title">Category Risk Analysis</h3>';
    html += '<div class="table-wrap"><table>';
    html += '<thead><tr>';
    html += '<th class="c">Cat</th><th>Category</th><th class="r">Budget</th><th class="r">Contract</th>';
    html += '<th class="r">Spent+Committed</th><th class="c">% Used</th><th class="r">Budget Remaining</th>';
    html += '<th class="c">Margin Status</th><th class="c">Risk Flag</th><th>Notes</th>';
    html += '</tr></thead><tbody>';

    cats.forEach(c => {
        const catNum = c.category_number;
        const catBudget = getCatBudget(c);
        const catContract = getCatContract(c);
        const catSpent = (c.actual || 0) + (c.committed || 0);
        const catUsed = catBudget > 0 ? (catSpent / catBudget) * 100 : (catSpent > 0 ? 100 : 0);
        const catRemaining = catBudget - catSpent;
        const noBudget = !catBudget || catBudget === 0;

        // Margin status
        let marginStatus;
        if (catContract <= 0) {
            marginStatus = '<span class="text-light">--</span>';
        } else if (catSpent > catContract) {
            marginStatus = '<span class="text-neg text-bold">OVER</span>';
        } else if (catSpent / catContract > 0.8) {
            marginStatus = '<span class="text-caution text-bold">TIGHT</span>';
        } else {
            marginStatus = '<span class="text-pos">HEALTHY</span>';
        }

        html += '<tr>';
        html += '<td class="c">' + catDot(catNum) + '</td>';
        html += '<td>' + esc(getCatName(c)) + '</td>';
        html += '<td class="r mono">' + fmt(catBudget) + '</td>';
        html += '<td class="r mono">' + fmt(catContract) + '</td>';
        html += '<td class="r mono">' + fmt(catSpent) + '</td>';
        html += '<td class="c ' + pctBgClass(catUsed, noBudget && catSpent > 0) + '">' + pct(catUsed) + '</td>';
        html += '<td class="r mono ' + (catRemaining < 0 ? 'text-neg' : 'text-pos') + '">' + fmt(catRemaining) + '</td>';
        html += '<td class="c">' + marginStatus + '</td>';
        html += '<td class="c">' + riskFlag(catSpent, catBudget) + '</td>';
        html += '<td>' + esc(c.notes || '') + '</td>';
        html += '</tr>';
    });
    html += '</tbody></table></div>';

    // Forecast section
    const eac = exposure;
    const forecastVsBudget = budget - eac;
    const forecastMargin = contract - eac;
    const forecastMarginPct = contract > 0 ? (forecastMargin / contract) * 100 : 0;

    html += '<h3 class="section-title">Forecast</h3>';
    html += '<div class="forecast-grid">';
    html += forecastCard(fmt(eac), 'EAC (Estimate at Completion)');
    html += forecastCard(signedFmt(forecastVsBudget), 'Forecast vs Budget', forecastVsBudget >= 0 ? 'text-pos' : 'text-neg');
    html += forecastCard(signedFmt(forecastMargin), 'Forecast Final Margin', forecastMargin >= 0 ? 'text-pos' : 'text-neg');
    html += forecastCard(pct(forecastMarginPct), 'Forecast Margin %', forecastMarginPct >= 0 ? 'text-pos' : 'text-neg');
    html += '</div>';

    document.getElementById('tab-0').innerHTML = html;
}

function statCard(value, label, borderColor) {
    return '<div class="stat-card" style="border-top-color:' + borderColor + '">' +
        '<div class="stat-value" style="color:' + borderColor + '">' + value + '</div>' +
        '<div class="stat-label">' + label + '</div></div>';
}

function forecastCard(value, label, colorClass) {
    return '<div class="forecast-card">' +
        '<div class="forecast-value ' + (colorClass || '') + '">' + value + '</div>' +
        '<div class="forecast-label">' + label + '</div></div>';
}


// ===== TAB 1: COST SUMMARY =====
function renderCostSummary() {
    const d = _data;
    const cats = d.categories || [];
    const totals = d.totals || {};
    const transactions = d.transactions || [];

    let html = '';

    // Full financials table
    html += '<h3 class="section-title">Full Financials</h3>';

    // Check for unbudgeted spend
    const unbudgetedCats = cats.filter(c => (!getCatBudget(c)) && ((c.actual || 0) + (c.committed || 0)) > 0);
    if (unbudgetedCats.length > 0) {
        html += '<div class="alert-box purple">';
        html += '<strong>Unbudgeted Spend Alert:</strong> ';
        html += unbudgetedCats.map(c => esc(getCatName(c))).join(', ');
        html += ' have spend with no budget allocated.';
        html += '</div>';
    }

    html += '<div class="table-wrap"><table>';
    html += '<thead><tr>';
    html += '<th class="c">Cat</th><th>Category</th><th class="r">Budget</th><th class="r">Contract</th>';
    html += '<th class="r">Actual</th><th class="r">Committed</th><th class="r">Exposure</th>';
    html += '<th class="r">Budget Var</th><th class="c">% Spent</th><th class="r">Built-in Margin</th>';
    html += '<th class="r">Margin at Risk</th>';
    html += '</tr></thead><tbody>';

    let sumBudget = 0, sumContract = 0, sumActual = 0, sumCommitted = 0, sumExposure = 0;

    cats.forEach(c => {
        const catNum = c.category_number;
        const bgt = getCatBudget(c);
        const ctr = getCatContract(c);
        const act = c.actual || 0;
        const com = c.committed || 0;
        const exp = act + com;
        const variance = bgt - exp;
        const pctS = bgt > 0 ? (act / bgt) * 100 : (act > 0 ? 100 : 0);
        const noBudget = !bgt || bgt === 0;
        const builtInMargin = ctr - bgt;
        const marginAtRisk = ctr - exp;

        sumBudget += bgt; sumContract += ctr; sumActual += act; sumCommitted += com; sumExposure += exp;

        let marginAtRiskCls;
        if (marginAtRisk < 0) marginAtRiskCls = 'text-neg';
        else if (marginAtRisk < builtInMargin * 0.5) marginAtRiskCls = 'text-caution';
        else marginAtRiskCls = 'text-pos';

        html += '<tr>';
        html += '<td class="c">' + catDot(catNum) + '</td>';
        html += '<td>' + esc(getCatName(c)) + '</td>';
        html += '<td class="r mono">' + fmt(bgt) + '</td>';
        html += '<td class="r mono">' + fmt(ctr) + '</td>';
        html += '<td class="r mono">' + fmt(act) + '</td>';
        html += '<td class="r mono">' + fmt(com) + '</td>';
        html += '<td class="r mono">' + fmt(exp) + '</td>';
        html += '<td class="r mono ' + (variance < 0 ? 'text-neg' : 'text-pos') + '">' + fmt(variance) + '</td>';
        html += '<td class="c ' + pctBgClass(pctS, noBudget && act > 0) + '">' + pct(pctS) + '</td>';
        html += '<td class="r mono">' + fmt(builtInMargin) + '</td>';
        html += '<td class="r mono ' + marginAtRiskCls + '">' + fmt(marginAtRisk) + '</td>';
        html += '</tr>';
    });

    // Total row
    const totVar = sumBudget - sumExposure;
    const totPctS = sumBudget > 0 ? (sumActual / sumBudget) * 100 : 0;
    const totBIM = sumContract - sumBudget;
    const totMAR = sumContract - sumExposure;

    html += '<tr class="total-row">';
    html += '<td></td><td>TOTAL</td>';
    html += '<td class="r mono">' + fmt(sumBudget) + '</td>';
    html += '<td class="r mono">' + fmt(sumContract) + '</td>';
    html += '<td class="r mono">' + fmt(sumActual) + '</td>';
    html += '<td class="r mono">' + fmt(sumCommitted) + '</td>';
    html += '<td class="r mono">' + fmt(sumExposure) + '</td>';
    html += '<td class="r mono ' + (totVar < 0 ? 'text-neg' : 'text-pos') + '">' + fmt(totVar) + '</td>';
    html += '<td class="c">' + pct(totPctS) + '</td>';
    html += '<td class="r mono">' + fmt(totBIM) + '</td>';
    html += '<td class="r mono ' + (totMAR < 0 ? 'text-neg' : 'text-pos') + '">' + fmt(totMAR) + '</td>';
    html += '</tr>';
    html += '</tbody></table></div>';

    // Revenue summary
    const revTxns = transactions.filter(t => t.is_revenue);
    if (revTxns.length > 0) {
        html += '<h3 class="section-title">Revenue Summary</h3>';
        html += '<div class="table-wrap"><table>';
        html += '<thead><tr>';
        html += '<th>Date</th><th>Description</th><th>Cost Code</th><th>PO Number</th><th class="r">Value</th><th class="r">Total</th>';
        html += '</tr></thead><tbody>';

        let runningTotal = 0;
        revTxns.forEach(t => {
            runningTotal += (parseFloat(t.total_cost) || 0);
            html += '<tr>';
            html += '<td>' + fmtDate(t.date) + '</td>';
            html += '<td>' + esc(t.description) + '</td>';
            html += '<td class="mono">' + esc(t.cost_code) + '</td>';
            html += '<td>' + esc(t.po_number || '') + '</td>';
            html += '<td class="r mono text-green">' + fmt(t.total_cost) + '</td>';
            html += '<td class="r mono text-green">' + fmt(runningTotal) + '</td>';
            html += '</tr>';
        });
        html += '<tr class="total-row">';
        html += '<td colspan="4">TOTAL</td>';
        html += '<td class="r mono text-green">' + fmt(runningTotal) + '</td>';
        html += '<td></td>';
        html += '</tr>';
        html += '</tbody></table></div>';
    }

    // Margin summary
    const totalRevenue = totals.total_revenue || _data.job.total_revenue || 0;
    const budgetPerf = sumBudget - sumExposure;
    const projMargin = sumContract - sumExposure;
    const revVsCost = totalRevenue - sumActual;
    const grossMarginPct = totalRevenue > 0 ? (revVsCost / totalRevenue) * 100 : 0;

    html += '<h3 class="section-title">Margin Summary</h3>';
    html += '<div class="margin-grid">';
    html += forecastCard(signedFmt(budgetPerf), 'Budget Performance (' + (budgetPerf >= 0 ? 'under' : 'over') + ' budget)', budgetPerf >= 0 ? 'text-pos' : 'text-neg');
    html += forecastCard(fmt(projMargin), 'Projected Margin', projMargin >= 0 ? 'text-pos' : 'text-neg');
    html += forecastCard(signedFmt(revVsCost), 'Revenue vs Cost', revVsCost >= 0 ? 'text-pos' : 'text-neg');
    html += forecastCard(pct(grossMarginPct), 'Gross Margin %', grossMarginPct >= 0 ? 'text-pos' : 'text-neg');
    html += '</div>';

    document.getElementById('tab-1').innerHTML = html;
}


// ===== TAB 2: SPEND ANALYSIS =====
function renderSpendAnalysis() {
    const d = _data;
    const cats = d.categories || [];
    const totals = d.totals || {};
    const transactions = d.transactions || [];

    const totalSpend = totals.actual_spend || _data.job.total_actual || 0;
    const budget = totals.budget_at_cost || _data.job.total_at_cost || 0;
    const budgetVar = budget - totalSpend;
    const overBudgetCount = cats.filter(c => {
        const b = getCatBudget(c);
        return b > 0 && (c.actual || 0) > b;
    }).length;

    // Calculate avg monthly spend
    const dates = transactions.filter(t => !t.is_revenue).map(t => new Date(t.date)).filter(d => !isNaN(d));
    let avgMonthly = 0;
    if (dates.length > 1) {
        const minDate = new Date(Math.min(...dates));
        const maxDate = new Date(Math.max(...dates));
        const months = Math.max(1, (maxDate.getFullYear() - minDate.getFullYear()) * 12 + (maxDate.getMonth() - minDate.getMonth()) + 1);
        avgMonthly = totalSpend / months;
    }

    let html = '';

    // Stat cards
    html += '<div class="stat-row">';
    html += statCard(fmt(totalSpend), 'Total Spend', '#CC0000');
    html += statCard(signedFmt(budgetVar), 'Budget Variance', budgetVar >= 0 ? '#006600' : '#CC0000');
    html += statCard(String(overBudgetCount), 'Categories Over Budget', overBudgetCount > 0 ? '#CC0000' : '#006600');
    html += statCard(fmt(avgMonthly), 'Avg Monthly Spend', '#E68A00');
    html += '<div></div>';
    html += '</div>';

    // Category variance table (sorted worst first)
    html += '<h3 class="section-title">Category Variance (Worst First)</h3>';
    const sortedCats = [...cats].sort((a, b) => {
        const varA = getCatBudget(a) - ((a.actual || 0) + (a.committed || 0));
        const varB = getCatBudget(b) - ((b.actual || 0) + (b.committed || 0));
        return varA - varB;
    });

    html += '<div class="table-wrap"><table>';
    html += '<thead><tr>';
    html += '<th class="c">Cat</th><th>Category</th><th class="r">Budget</th><th class="r">Actual</th>';
    html += '<th class="r">Committed</th><th class="r">Exposure</th><th class="r">Variance</th>';
    html += '<th class="c">% Used</th><th class="c">Status</th>';
    html += '</tr></thead><tbody>';

    sortedCats.forEach(c => {
        const catNum = c.category_number;
        const bgt = getCatBudget(c);
        const act = c.actual || 0;
        const com = c.committed || 0;
        const exp = act + com;
        const variance = bgt - exp;
        const pctUsed = bgt > 0 ? (exp / bgt) * 100 : (exp > 0 ? 100 : 0);
        const noBudget = !bgt || bgt === 0;

        let statusHtml;
        if (noBudget && exp > 0) statusHtml = statusPill('UNBUDGETED', 'unbudgeted');
        else if (exp > bgt && bgt > 0) statusHtml = statusPill('OVER BUDGET', 'over');
        else if (pctUsed > 80) statusHtml = statusPill('AT RISK', 'at-risk');
        else statusHtml = statusPill('OK', 'ok');

        html += '<tr>';
        html += '<td class="c">' + catDot(catNum) + '</td>';
        html += '<td>' + esc(getCatName(c)) + '</td>';
        html += '<td class="r mono">' + fmt(bgt) + '</td>';
        html += '<td class="r mono">' + fmt(act) + '</td>';
        html += '<td class="r mono">' + fmt(com) + '</td>';
        html += '<td class="r mono">' + fmt(exp) + '</td>';
        html += '<td class="r mono ' + (variance < 0 ? 'text-neg' : 'text-pos') + '">' + fmt(variance) + '</td>';
        html += '<td class="c ' + pctBgClass(pctUsed, noBudget && exp > 0) + '">' + pct(pctUsed) + '</td>';
        html += '<td class="c">' + statusHtml + '</td>';
        html += '</tr>';
    });
    html += '</tbody></table></div>';

    // Overtime analysis
    const otData = d.overtime_analysis || [];
    if (otData.length > 0) {
        html += '<h3 class="section-title">Overtime Analysis</h3>';
        html += '<div class="table-wrap"><table>';
        html += '<thead><tr>';
        html += '<th>Trade</th><th class="r">Normal Hrs</th><th class="r">Normal Cost</th>';
        html += '<th class="r">OT Hrs</th><th class="r">OT Cost</th><th class="r">OT Rate</th>';
        html += '<th class="r">Normal Rate</th><th class="r">Rate Premium</th><th class="c">OT %</th>';
        html += '</tr></thead><tbody>';

        otData.forEach(ot => {
            const otPct = ot.ot_percentage || 0;
            html += '<tr>';
            html += '<td>' + esc(ot.trade) + '</td>';
            html += '<td class="r mono">' + (ot.normal_hours || 0).toFixed(1) + '</td>';
            html += '<td class="r mono">' + fmt(ot.normal_cost) + '</td>';
            html += '<td class="r mono">' + (ot.ot_hours || 0).toFixed(1) + '</td>';
            html += '<td class="r mono">' + fmt(ot.ot_cost) + '</td>';
            html += '<td class="r mono">' + fmt(ot.ot_rate, true) + '</td>';
            html += '<td class="r mono">' + fmt(ot.normal_rate, true) + '</td>';
            html += '<td class="r mono">' + fmt(ot.rate_premium, true) + '</td>';
            html += '<td class="c ' + (otPct > 20 ? 'text-neg text-bold' : '') + '">' + pct(otPct) + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div>';
    }

    // Monthly spend trajectory
    const monthly = d.monthly_spend || [];
    if (monthly.length > 0) {
        html += '<h3 class="section-title">Monthly Spend Trajectory</h3>';
        html += '<div class="table-wrap"><table>';
        html += '<thead><tr>';
        html += '<th>Month</th><th class="r">Spend</th><th class="r">Cumulative</th>';
        html += '<th class="c">% Budget</th><th class="c">% Contract</th><th class="c">Threshold</th>';
        html += '</tr></thead><tbody>';

        const contractTotal = totals.contract_value || _data.job.total_contract || 0;
        monthly.forEach(m => {
            const pctBud = budget > 0 ? (m.cumulative / budget) * 100 : 0;
            const pctCon = contractTotal > 0 ? (m.cumulative / contractTotal) * 100 : 0;
            let threshold;
            if (pctBud > 90) threshold = statusPill('CRITICAL', 'critical');
            else if (pctBud >= 70) threshold = statusPill('WARNING', 'warning');
            else threshold = statusPill('OK', 'ok');

            html += '<tr>';
            html += '<td>' + esc(m.month) + '</td>';
            html += '<td class="r mono">' + fmt(m.spend) + '</td>';
            html += '<td class="r mono">' + fmt(m.cumulative) + '</td>';
            html += '<td class="c">' + pct(pctBud) + '</td>';
            html += '<td class="c">' + pct(pctCon) + '</td>';
            html += '<td class="c">' + threshold + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div>';
    }

    // Top 15 suppliers
    const suppliers = d.top_suppliers || [];
    if (suppliers.length > 0) {
        html += '<h3 class="section-title">Top 15 Suppliers</h3>';
        html += '<div class="table-wrap"><table>';
        html += '<thead><tr>';
        html += '<th class="c">Rank</th><th>Supplier</th><th class="r">Total Spend</th>';
        html += '<th class="c">% of Project</th><th>Primary Category</th>';
        html += '</tr></thead><tbody>';

        suppliers.slice(0, 15).forEach((s, i) => {
            const spend = s.total_spend || s.total || 0;
            const pctProj = totalSpend > 0 ? (Math.abs(spend) / Math.abs(totalSpend)) * 100 : 0;
            html += '<tr>';
            html += '<td class="c">' + (i + 1) + '</td>';
            html += '<td>' + esc(s.supplier || s.supplier_name || s.name || '') + '</td>';
            html += '<td class="r mono">' + fmt(spend) + '</td>';
            html += '<td class="c">' + pct(pctProj) + '</td>';
            html += '<td>' + esc(s.primary_category || '') + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div>';
    }

    // Top 25 transactions
    const sortedTxns = [...transactions]
        .filter(t => !t.is_revenue)
        .sort((a, b) => Math.abs(parseFloat(b.total_cost) || 0) - Math.abs(parseFloat(a.total_cost) || 0))
        .slice(0, 25);

    if (sortedTxns.length > 0) {
        html += '<h3 class="section-title">Top 25 Transactions</h3>';
        html += '<div class="table-wrap"><table>';
        html += '<thead><tr>';
        html += '<th class="c">Rank</th><th>Date</th><th>Category</th><th>Supplier</th>';
        html += '<th>Cost Code</th><th>Description</th><th class="r">Total Cost</th>';
        html += '</tr></thead><tbody>';

        sortedTxns.forEach((t, i) => {
            html += '<tr>';
            html += '<td class="c">' + (i + 1) + '</td>';
            html += '<td>' + fmtDate(t.date) + '</td>';
            html += '<td>' + esc(t.category_name || catName(t.category_number)) + '</td>';
            html += '<td>' + esc(t.supplier || t.employee || '') + '</td>';
            html += '<td class="mono">' + esc(t.cost_code || '') + '</td>';
            html += '<td>' + esc(t.description || '') + '</td>';
            html += '<td class="r mono">' + fmt(t.total_cost) + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div>';
    }

    document.getElementById('tab-2').innerHTML = html;
}

function _catSelectHtml(txnId, currentCat, isRevenue) {
    if (isRevenue) return '<span class="text-green">Revenue</span>';
    var s = '<select class="cat-inline-select" data-txn="' + esc(txnId) + '" onchange="markTxnChanged(this)">';
    s += '<option value="0"' + (!currentCat || currentCat === 0 ? ' selected' : '') + ' style="color:#9333ea">-- Unallocated --</option>';
    for (var i = 1; i <= 8; i++) {
        s += '<option value="' + i + '"' + (currentCat === i ? ' selected' : '') + '>Cat ' + i + ' - ' + catName(i) + '</option>';
    }
    s += '</select>';
    return s;
}

function renderTxnRows(txns) {
    let html = '';
    txns.forEach(t => {
        const isRevenue = t.is_revenue;
        const isNeg = (parseFloat(t.total_cost) || 0) < 0;
        const valClass = isRevenue ? 'text-green' : (isNeg ? 'text-neg' : '');
        const catNum = t.category_number || t.mapped_category || 0;
        const typeLower = (t.trans_type || '').toLowerCase().replace(/\s+/g, '_');
        const rowClass = (!catNum && !isRevenue) ? ' style="background:#faf5ff"' : '';

        html += '<tr data-id="' + esc(t.id) + '" data-cat="' + (isRevenue ? 'revenue' : (catNum || 'unallocated')) + '" data-type="' + esc(typeLower) + '"' + rowClass + '>';
        html += '<td>' + fmtDate(t.date) + '</td>';
        html += '<td>' + esc(t.trans_type || '') + '</td>';
        html += '<td class="mono">' + esc(t.cost_code || '') + '</td>';
        html += '<td>' + esc(t.description || '') + '</td>';
        html += '<td>' + esc(t.supplier || t.supplier_name || t.employee || '') + '</td>';
        html += '<td class="r mono ' + valClass + '">' + fmt(t.value) + '</td>';
        html += '<td class="r mono ' + valClass + '">' + fmt(t.total_cost) + '</td>';
        html += '<td>' + _catSelectHtml(t.id, catNum, isRevenue) + '</td>';
        html += '</tr>';
    });
    return html;
}

function markTxnChanged(sel) {
    var txnId = sel.getAttribute('data-txn');
    var newCat = parseInt(sel.value);
    var row = sel.closest('tr');

    // Track the change
    _txnPendingChanges[txnId] = newCat;

    // Visual feedback: highlight changed row
    row.style.background = newCat ? '#f0fdf4' : '#faf5ff';
    row.setAttribute('data-cat', newCat || 'unallocated');

    // Update pending count
    var count = Object.keys(_txnPendingChanges).length;
    var pendEl = document.getElementById('txn-pending');
    var saveBtn = document.getElementById('txn-save-btn');
    if (count > 0) {
        pendEl.textContent = count + ' unsaved change' + (count > 1 ? 's' : '');
        pendEl.style.display = '';
        saveBtn.style.display = '';
    } else {
        pendEl.style.display = 'none';
        saveBtn.style.display = 'none';
    }
}

async function savePendingChanges() {
    var ids = Object.keys(_txnPendingChanges);
    if (!ids.length) return;

    var saveBtn = document.getElementById('txn-save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving ' + ids.length + '...';

    try {
        for (var i = 0; i < ids.length; i++) {
            await CostDB.manuallyMapTransaction(ids[i], _txnPendingChanges[ids[i]]);
        }
        _txnPendingChanges = {};

        // Reload data and refresh all tabs
        _data = await CostDB.getFullAnalysis(_jobId);
        _tabDirty = [true, true, true, true, true, true];
        renderTransactions();
        alert(ids.length + ' transaction(s) updated successfully.');
    } catch(e) {
        console.error('Save failed:', e);
        alert('Failed to save: ' + e.message);
    } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
    }
}

function batchAssignVisible() {
    var catVal = document.getElementById('txn-batch-cat').value;
    if (!catVal) { alert('Select a category first'); return; }
    var newCat = parseInt(catVal);

    var rows = document.querySelectorAll('#txn-tbody tr');
    var changed = 0;
    rows.forEach(function(row) {
        if (row.style.display === 'none') return;
        var rowCat = row.getAttribute('data-cat');
        if (rowCat === 'revenue') return;
        // Only batch-assign unallocated rows (or all visible if desired)
        if (rowCat !== 'unallocated' && rowCat !== '' && rowCat !== 'null' && rowCat !== '0') return;

        var sel = row.querySelector('.cat-inline-select');
        if (sel) {
            sel.value = newCat;
            markTxnChanged(sel);
            changed++;
        }
    });

    if (changed === 0) {
        alert('No unallocated transactions visible to assign.');
    }
}

function applyTxnFilters() {
    const catFilter = document.getElementById('txn-filter-cat').value;
    const typeFilter = document.getElementById('txn-filter-type').value;
    const rows = document.querySelectorAll('#txn-tbody tr');
    let visible = 0;

    rows.forEach(row => {
        const rowCat = row.getAttribute('data-cat');
        const rowType = row.getAttribute('data-type');
        let show = true;

        if (catFilter) {
            if (catFilter === 'unallocated') {
                show = show && (rowCat === 'unallocated' || rowCat === '' || rowCat === 'null' || rowCat === '0');
            } else if (catFilter === 'revenue') {
                show = show && rowCat === 'revenue';
            } else {
                show = show && rowCat === catFilter;
            }
        }
        if (typeFilter) {
            show = show && rowType === typeFilter;
        }

        row.style.display = show ? '' : 'none';
        if (show) visible++;
    });

    document.getElementById('txn-count').textContent = visible + ' transactions';
}

async function askAiSuggest() {
    const btn = document.getElementById('btn-ai-suggest');
    if (btn) { btn.disabled = true; btn.textContent = 'Analysing patterns...'; }
    try {
        const result = await CostDB.aiSuggestMappings(_jobId);
        const sRules = result.supplier_mappings || [];
        const lRules = result.labour_mappings || [];

        if (!sRules.length && !lRules.length) {
            alert('AI returned no mapping rules. ' + result.unmapped_count + ' unmapped transactions analysed across ' + result.pattern_count + ' patterns.');
            return;
        }

        // Build review modal — show proposed RULES, not individual transactions
        let html = '<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center" id="ai-modal">';
        html += '<div style="background:#fff;border-radius:12px;max-width:800px;width:95%;max-height:85vh;overflow:auto;padding:24px">';
        html += '<h3 style="margin:0 0 4px">AI Mapping Rules</h3>';
        html += '<p style="font-size:0.85rem;color:var(--text-light);margin:0 0 16px">'
            + 'Analysed ' + result.unmapped_count + ' unmapped transactions (' + result.pattern_count + ' unique patterns). '
            + 'These rules will apply to <strong>all current and future imports</strong>. Uncheck any you disagree with.</p>';

        // Supplier rules
        if (sRules.length) {
            html += '<h4 style="margin:0 0 8px;font-size:0.9rem">Supplier Rules (' + sRules.length + ')</h4>';
            html += '<table style="width:100%;font-size:0.82rem;border-collapse:collapse;margin-bottom:16px">';
            html += '<thead><tr style="background:#f8f9fa"><th style="text-align:left;padding:6px;width:30px"></th><th style="padding:6px;text-align:left">Supplier Prefix</th><th style="padding:6px;text-align:left">Code Prefix</th><th style="padding:6px;text-align:left">Category</th><th style="padding:6px;text-align:left">Reason</th></tr></thead><tbody>';
            sRules.forEach((r, idx) => {
                html += '<tr style="border-bottom:1px solid #eee">';
                html += '<td style="padding:6px"><input type="checkbox" checked data-type="supplier" data-idx="' + idx + '" class="ai-rule-accept"></td>';
                html += '<td style="padding:6px;font-weight:500">' + esc(r.supplier_prefix) + '</td>';
                html += '<td style="padding:6px">' + esc(r.cost_code_prefix || '(any)') + '</td>';
                html += '<td style="padding:6px">' + r.category_number + ' - ' + catName(r.category_number) + '</td>';
                html += '<td style="padding:6px;font-size:0.78rem;color:var(--text-light)">' + esc(r.note || '') + '</td>';
                html += '</tr>';
            });
            html += '</tbody></table>';
        }

        // Labour rules
        if (lRules.length) {
            html += '<h4 style="margin:0 0 8px;font-size:0.9rem">Labour Rules (' + lRules.length + ')</h4>';
            html += '<table style="width:100%;font-size:0.82rem;border-collapse:collapse;margin-bottom:16px">';
            html += '<thead><tr style="background:#f8f9fa"><th style="text-align:left;padding:6px;width:30px"></th><th style="padding:6px;text-align:left">Cost Code</th><th style="padding:6px;text-align:left">Category</th><th style="padding:6px;text-align:left">Reason</th></tr></thead><tbody>';
            lRules.forEach((r, idx) => {
                html += '<tr style="border-bottom:1px solid #eee">';
                html += '<td style="padding:6px"><input type="checkbox" checked data-type="labour" data-idx="' + idx + '" class="ai-rule-accept"></td>';
                html += '<td style="padding:6px;font-weight:500">' + esc(r.cost_code) + '</td>';
                html += '<td style="padding:6px">' + r.category_number + ' - ' + catName(r.category_number) + '</td>';
                html += '<td style="padding:6px;font-size:0.78rem;color:var(--text-light)">' + esc(r.note || '') + '</td>';
                html += '</tr>';
            });
            html += '</tbody></table>';
        }

        html += '<div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">';
        html += '<button onclick="document.getElementById(\'ai-modal\').remove()" style="padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer">Cancel</button>';
        html += '<button onclick="applyAiRules()" style="padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer">Create Rules &amp; Re-map</button>';
        html += '</div></div></div>';

        document.body.insertAdjacentHTML('beforeend', html);

        // Store for apply
        window._aiSupplierRules = sRules;
        window._aiLabourRules = lRules;

    } catch(e) {
        console.error('AI suggest error:', e);
        alert('AI suggestion failed: ' + e.message);
    } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = '&#9733; AI Suggest'; }
    }
}

async function applyAiRules() {
    const applyBtn = event.target;
    applyBtn.disabled = true;
    applyBtn.textContent = 'Creating rules...';

    try {
        const sRules = window._aiSupplierRules || [];
        const lRules = window._aiLabourRules || [];

        // Collect checked rules
        const acceptedSupplier = [];
        const acceptedLabour = [];
        document.querySelectorAll('.ai-rule-accept:checked').forEach(cb => {
            const idx = parseInt(cb.dataset.idx);
            if (cb.dataset.type === 'supplier' && sRules[idx]) acceptedSupplier.push(sRules[idx]);
            if (cb.dataset.type === 'labour' && lRules[idx]) acceptedLabour.push(lRules[idx]);
        });

        if (!acceptedSupplier.length && !acceptedLabour.length) {
            alert('No rules selected.');
            return;
        }

        // Create mapping rules and re-run mapping engine
        const result = await CostDB.applyAiMappingRules(_jobId, acceptedSupplier, acceptedLabour);

        // Remove modal
        const modal = document.getElementById('ai-modal');
        if (modal) modal.remove();

        // Reload all data
        _data = await CostDB.getFullAnalysis(_jobId);
        _tabDirty = [true, true, true, true, true, true];
        renderTransactions();

        const mr = result.mapping_result || {};
        alert(
            'Created ' + result.supplier_created + ' supplier rule(s) and ' + result.labour_created + ' labour rule(s).\n' +
            'Re-mapped: ' + (mr.mapped || 0) + ' mapped, ' + (mr.unmapped || 0) + ' still unmapped.'
        );
    } catch(e) {
        console.error('Apply AI rules error:', e);
        alert('Failed to apply rules: ' + e.message);
    } finally {
        applyBtn.disabled = false;
        applyBtn.textContent = 'Create Rules & Re-map';
    }
}


// ===== TAB 4: WEEKLY SUMMARY =====
function renderWeeklySummary() {
    // Use pre-computed weekly data from CostDB
    const weeklyData = _data.weekly_spend || [];

    // Determine active categories across all weeks
    const activeCats = [];
    const catSeen = {};
    weeklyData.forEach(w => {
        for (const [cat, val] of Object.entries(w.categories || {})) {
            const cn = parseInt(cat);
            if (cn >= 1 && cn <= 8 && Math.abs(val) > 0) catSeen[cn] = true;
        }
    });
    for (let i = 1; i <= 8; i++) {
        if (catSeen[i]) activeCats.push(i);
    }

    const weeks = weeklyData;

    let html = '';
    html += '<h3 class="section-title">Weekly Spend Summary</h3>';

    if (weeks.length === 0) {
        html += '<div style="text-align:center;padding:32px;color:var(--text-light)">No transaction data to summarise.</div>';
        document.getElementById('tab-4').innerHTML = html;
        return;
    }

    html += '<div class="table-wrap scrollable"><table>';
    html += '<thead><tr>';
    html += '<th>Week Commencing</th><th class="c">Txns</th>';
    activeCats.forEach(c => {
        html += '<th class="r" style="color:' + CAT_COLORS[c] + '">Cat ' + c + '</th>';
    });
    html += '<th class="r">Week Total</th><th class="r">Cumulative</th>';
    html += '</tr></thead><tbody>';

    let cumulative = 0;
    weeks.forEach(w => {
        const weekTotal = w.total || 0;
        cumulative += weekTotal;

        html += '<tr>';
        html += '<td>' + fmtDate(w.week_commencing) + '</td>';
        html += '<td class="c">' + (w.count || 0) + '</td>';
        activeCats.forEach(c => {
            const val = (w.categories || {})[c] || 0;
            html += '<td class="r mono">' + (val !== 0 ? fmt(val) : '--') + '</td>';
        });
        html += '<td class="r mono text-bold">' + fmt(weekTotal) + '</td>';
        html += '<td class="r mono">' + fmt(cumulative) + '</td>';
        html += '</tr>';
    });

    html += '</tbody></table></div>';

    document.getElementById('tab-4').innerHTML = html;
}

    html += '<th style="text-align:right;padding:8px;background:#f8f9fa;border-bottom:2px solid var(--border);font-size:0.68rem;font-weight:700;text-transform:uppercase;color:var(--text-light)">Contract Value</th>';
    html += '<th style="text-align:right;padding:8px;background:#f8f9fa;border-bottom:2px solid var(--border);font-size:0.68rem;font-weight:700;text-transform:uppercase;color:var(--text-light)">At Cost</th></tr></thead><tbody>';

    (job.categories || []).forEach(c => {
        html += '<tr>';
        html += '<td style="text-align:center;padding:6px 8px;border-bottom:1px solid #f0f0f0">' + catDot(c.category_number) + '</td>';
        html += '<td style="padding:6px 8px;border-bottom:1px solid #f0f0f0">' + esc(getCatName(c)) + '</td>';
        html += '<td style="text-align:right;padding:6px 8px;border-bottom:1px solid #f0f0f0"><input type="number" class="est-cv" data-cat="' + c.category_number + '" value="' + (parseFloat(c.contract_value) || 0).toFixed(2) + '" min="0" step="0.01" style="width:120px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;text-align:right;font-size:0.82rem" oninput="updateEstimateTotals()"></td>';
        html += '<td style="text-align:right;padding:6px 8px;border-bottom:1px solid #f0f0f0;color:var(--text-light)" class="est-ac" data-cat="' + c.category_number + '">' + fmt(c.at_cost || 0) + '</td>';
        html += '</tr>';
    });

    html += '</tbody><tfoot><tr>';
    html += '<td></td><td style="padding:8px;font-weight:700;border-top:2px solid var(--border)">Total</td>';
    html += '<td style="text-align:right;padding:8px;font-weight:700;border-top:2px solid var(--border)" id="est-total-cv">' + fmt(job.total_contract || 0) + '</td>';
    html += '<td style="text-align:right;padding:8px;font-weight:700;border-top:2px solid var(--border)" id="est-total-ac">' + fmt(job.total_at_cost || 0) + '</td>';
    html += '</tr></tfoot></table>';
    html += '<div style="margin-top:12px;text-align:right">';
    html += '<button onclick="saveBudgets()" style="padding:8px 18px;border:none;border-radius:6px;background:#28a745;color:var(--white);font-size:0.82rem;font-weight:600;cursor:pointer;font-family:inherit">Save Budgets</button>';
    html += '</div>';
    html += '</div>';

    document.getElementById('tab-5').innerHTML = html;
}

function updateEstimateTotals() {
    const markup = parseFloat(document.getElementById('est-markup').value) || 14;
    const multiplier = 1 + markup / 100;
    let totalCv = 0, totalAc = 0;

    document.querySelectorAll('.est-cv').forEach(input => {
        const cv = parseFloat(input.value) || 0;
        const ac = multiplier > 0 ? cv / multiplier : 0;
        totalCv += cv;
        totalAc += ac;
        const catNum = input.dataset.cat;
        const acEl = document.querySelector('.est-ac[data-cat="' + catNum + '"]');
        if (acEl) acEl.textContent = fmt(ac);
    });

    document.getElementById('est-total-cv').textContent = fmt(totalCv);
    document.getElementById('est-total-ac').textContent = fmt(totalAc);
}

async function saveEstimateRef() {
    const val = document.getElementById('estimate-ref-input').value.trim();
    try {
        await CostDB.updateJob(_jobId, { estimate_ref: val });

async function saveAiNotes() {

    try {
        await CostDB.updateJob(_jobId, { ai_notes: val });
        _data.job.ai_notes = val;

async function saveBudgets() {
    const markup = parseFloat(document.getElementById('est-markup').value) || 14;
    try {
        // Update markup first (this recalculates at_cost)
        await CostDB.updateMarkup(_jobId, markup);

        // Update individual category contract values
        const cats = await MiiDB.getAll('cost_categories');
        const jobCats = cats.filter(c => c.job_id === _jobId);
        const multiplier = 1 + markup / 100;

        document.querySelectorAll('.est-cv').forEach(input => {
            const catNum = parseInt(input.dataset.cat);
            const cv = parseFloat(input.value) || 0;
            const cat = jobCats.find(c => c.category_number === catNum);
            if (cat) {
                cat.contract_value = cv;
                cat.at_cost = multiplier > 0 ? cv / multiplier : 0;
                MiiDB.save('cost_categories', cat);
            }
        });

        // Reload analysis data
        _data = await CostDB.getFullAnalysis(_jobId);
        _tabDirty = [true, true, true, true, true, true];
        populateHeader(_data.job);
        alert('Budgets saved successfully.');
    } catch (e) {
        alert('Failed to save: ' + e.message);
    }
}

// ===== ESTIMATE FILE IMPORT =====
const CATEGORY_NAME_MAP = {
    'DESIGN': 1, 'DESIGN / MANAGEMENT': 1, 'DESIGN/MANAGEMENT': 1, 'DESIGN AND MANAGEMENT': 1, 'MANAGEMENT': 1,
    'LABOUR': 2, 'DIRECT LABOUR': 2, 'LABOR': 2,
    'PLANT & EQUIPMENT': 3, 'PLANT AND EQUIPMENT': 3, 'PLANT & EQUIP.': 3, 'PLANT & EQUIP': 3, 'PLANT': 3, 'CONSTRUCTION PLANT': 3, 'CONSTRUCTION PLANT & EQUIPMENT': 3,
    'EQUIPMENT HIRED': 4, 'HIRED EQUIPMENT': 4, 'HIRE EQUIPMENT': 4, 'EQUIPMENT HIRE': 4, 'EQUIP. HIRED': 4, 'CRANEAGE': 4,
    'MATERIALS': 5, 'MATERIAL': 5,
    'OFF SITE': 6, 'OFFSITE': 6, 'OFF SITE / SUBCONTRACT': 6, 'OFF-SITE': 6, 'SUB-CONTRACTORS': 6, 'SUBCONTRACTORS': 6, 'SUB CONTRACTORS': 6,
    'CONSUMABLES': 7, 'CONSUMABLE': 7,
    'TRAVEL & ACCOMMODATION': 8, 'TRAVEL AND ACCOMMODATION': 8, 'TRAVEL & ACCOMODATION': 8, 'TRAVEL & ACCOM.': 8, 'TRAVEL & ACCOM': 8, 'TRAVEL': 8, 'T&A': 8,
};
const CATEGORY_NAMES_EST = ['', 'Design', 'Labour', 'Plant & Equipment', 'Equipment Hired', 'Materials', 'Off Site', 'Consumables', 'Travel & Accommodation'];

function _estCellStr(aoa, row, col) {
    if (row >= aoa.length || !aoa[row]) return '';
    const v = aoa[row][col];
    return v != null ? v.toString().trim() : '';
}

function _normCatName(raw) {
    if (!raw) return null;
    return CATEGORY_NAME_MAP[raw.toString().trim().toUpperCase()] || null;
}

function parseEstimateFile(workbook) {
    let sheetName = null;
    for (const sn of workbook.SheetNames) {
        const lower = sn.toLowerCase();
        if (lower.includes('price matrix') && lower.includes('tata')) { sheetName = sn; break; }
    }
    if (!sheetName) sheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('price matrix'));
    if (!sheetName) sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];
    const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true });
    if (!aoa || aoa.length < 3) return null;

    const result = { estimate_ref: '', markup: null, categories: [] };

    // Find markup
    for (let r = 0; r < Math.min(10, aoa.length); r++) {
        for (let c = 0; c < (aoa[r] || []).length; c++) {
            const cell = (aoa[r] || [])[c];
            if (cell && typeof cell === 'string') {
                const m = cell.match(/@\s*(\d+(?:\.\d+)?)\s*%/);
                if (m) result.markup = parseFloat(m[1]);
            }
        }
    }

    // Find category name column
    let nameCol = -1, nameRowStart = -1;
    const colCount = Math.max.apply(null, aoa.slice(0, 10).map(r => r ? r.length : 0));
    for (let c = 0; c < colCount; c++) {
        let matchCount = 0, firstRow = -1;
        for (let r = 0; r < Math.min(10, aoa.length); r++) {
            if (_normCatName(_estCellStr(aoa, r, c))) {
                matchCount++;
                if (firstRow < 0) firstRow = r;
            }
        }
        if (matchCount >= 3) { nameCol = c; nameRowStart = firstRow; break; }
    }
    if (nameCol < 0) return null;

    // Find value column
    let valCol = -1, bestCount = 0;
    for (let vc = nameCol + 1; vc < colCount + 5; vc++) {
        let numCount = 0;
        for (let r = nameRowStart; r < Math.min(nameRowStart + 9, aoa.length); r++) {
            if (!_normCatName(_estCellStr(aoa, r, nameCol))) continue;
            const v = aoa[r] ? aoa[r][vc] : undefined;
            if (v != null && v !== '' && v !== '-' && !isNaN(parseFloat(v))) numCount++;
        }
        if (numCount > bestCount) { bestCount = numCount; valCol = vc; }
    }
    if (valCol < 0) valCol = nameCol + 1;

    // Extract categories
    for (let r = nameRowStart; r < Math.min(nameRowStart + 9, aoa.length); r++) {
        const catNum = _normCatName(_estCellStr(aoa, r, nameCol));
        if (!catNum || result.categories.find(x => x.category_number === catNum)) continue;
        let val = 0;
        const rawVal = aoa[r] ? aoa[r][valCol] : undefined;
        if (rawVal != null && rawVal !== '' && rawVal !== '-') val = parseFloat(rawVal) || 0;
        result.categories.push({ category_number: catNum, category_name: CATEGORY_NAMES_EST[catNum], contract_value: Math.round(val * 100) / 100 });
    }

    // Extract estimate ref
    for (let r = 0; r < Math.min(10, aoa.length); r++) {
        for (let c = 0; c < Math.min(nameCol, (aoa[r] || []).length); c++) {
            const v = _estCellStr(aoa, r, c);
            if (/^MII[-\s]/i.test(v) && !result.estimate_ref) result.estimate_ref = v;
        }
    }

    if (!result.markup) result.markup = 14;
    return result.categories.length > 0 ? result : null;
}

function _workbookToText(workbook) {
    var parts = [];
    workbook.SheetNames.forEach(function(sn) {
        var sheet = workbook.Sheets[sn];
        var aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true });
        if (!aoa || aoa.length === 0) return;
        parts.push('=== Sheet: ' + sn + ' ===');
        var maxRows = Math.min(aoa.length, 50);
        for (var r = 0; r < maxRows; r++) {
            var row = aoa[r] || [];
            var cells = [];
            var maxCols = Math.min(row.length, 25);
            for (var c = 0; c < maxCols; c++) {
                var v = row[c];
                if (v == null) cells.push('');
                else if (typeof v === 'number') cells.push(v === Math.floor(v) ? String(v) : v.toFixed(4));
                else cells.push(String(v).trim());
            }
            parts.push('Row ' + (r + 1) + ': ' + cells.join(' | '));
        }
    });
    return parts.join('\n');
}

async function _parseEstimateAI(workbook, filename) {
    var token = localStorage.getItem('mii_token');
    if (!token) return null;

    var sheetText = _workbookToText(workbook);
    if (!sheetText || sheetText.length < 50) return null;

    try {
        var resp = await fetch(MII_API + '/cost/parse-estimate', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ sheet_text: sheetText, filename: filename }),
        });
        if (!resp.ok) return null;
        var data = await resp.json();
        if (data.categories && data.categories.length > 0) {
            return data;
        }
    } catch (e) {
        console.warn('AI estimate parse failed:', e);
    }
    return null;
}

async function handleEstimateFileImport(e) {
    const file = e.target.files[0];
    if (!file) return;

    const statusEl = document.getElementById('estimate-file-status');
    statusEl.textContent = 'Parsing with AI...';
    statusEl.style.color = 'var(--text-light)';

    try {
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data, { type: 'array' });

        // Try AI first, fall back to hardcoded
        var result = await _parseEstimateAI(workbook, file.name);
        var method = 'ai';

        if (!result || !result.categories || !result.categories.length) {
            statusEl.textContent = 'AI unavailable, using local parser...';
            result = parseEstimateFile(workbook);
            method = 'local';
        }

        if (!result || !result.categories.length) {
            statusEl.textContent = 'No category data found in file.';
            statusEl.style.color = '#CC0000';
            return;
        }

        // Populate the category inputs
        const markup = result.markup || parseFloat(document.getElementById('est-markup').value) || 14;
        document.getElementById('est-markup').value = markup;

        result.categories.forEach(function(c) {
            const input = document.querySelector('.est-cv[data-cat="' + c.category_number + '"]');
            if (input) input.value = (parseFloat(c.contract_value) || 0).toFixed(2);
        });

        // Update estimate ref if found
        if (result.estimate_ref) {
            const refInput = document.getElementById('estimate-ref-input');
            if (refInput) refInput.value = result.estimate_ref;
        }

        // Recalculate at-cost values
        updateEstimateTotals();

        const total = result.categories.reduce(function(s, c) { return s + (parseFloat(c.contract_value) || 0); }, 0);
        var methodLabel = method === 'ai' ? 'AI' : 'local parser';
        statusEl.textContent = 'Loaded ' + result.categories.length + ' categories via ' + methodLabel + ' from ' + file.name + ' (total: ' + fmt(total) + '). Click Save Budgets to apply.';
        statusEl.style.color = '#006600';
    } catch (err) {
        console.error('Estimate file error:', err);
        statusEl.textContent = 'Failed: ' + err.message;
        statusEl.style.color = '#CC0000';
    }
}

// ===== PER-JOB IMPORT =====
document.getElementById('job-import-file').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file || !_jobId || !_data || !_data.job) return;
    e.target.value = '';

    const jobNumber = _data.job.job_number;
    const btn = this.previousElementSibling;
    const origText = btn.textContent;
    btn.textContent = 'Importing...';
    btn.disabled = true;

    try {
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data, { type: 'array' });
        const result = await CostDB.processImport(workbook, file.name, { jobFilter: [jobNumber] });
        const txnCount = result.total_inserted || result.count || 0;

        // Reload all data
        _data = await CostDB.getFullAnalysis(_jobId);
        _tabDirty = [true, true, true, true, true, true];
        _tabLoaded = [false, false, false, false, false, false];
        populateHeader(_data.job);
        renderTab(document.querySelector('.tab-btn.active').dataset.tab | 0);

        alert('Imported ' + txnCount + ' transactions for ' + jobNumber + ' from ' + file.name);
    } catch (err) {
        console.error('Job import error:', err);
        alert('Import failed: ' + err.message);
    } finally {
        btn.textContent = origText;
        btn.disabled = false;
    }
});

    navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
        if (regs.length) location.reload();
    });
}
