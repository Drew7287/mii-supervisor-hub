<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHEQ Observations — MII Engineering</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #003366;
            --accent: #0078d4;
            --success: #28a745;
            --warning: #e6a000;
            --danger: #dc3545;
            --bg: #f0f2f5;
            --white: #ffffff;
            --border: #d0d5dd;
            --text: #1a1a1a;
            --text-light: #667085;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }

        /* ===== TOP BAR ===== */
        .topbar { background: var(--primary); color: var(--white); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
        .topbar h1 { font-size: 1.05rem; font-weight: 700; }
        .topbar a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.85rem; }
        .topbar a:hover { color: #fff; }

        /* ===== CONTENT ===== */
        .content { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* ===== SEARCH / TOOLBAR ===== */
        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
        .search-box { flex: 1; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; font-family: inherit; background: var(--white); }
        .search-box:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,120,212,0.12); }
        .toolbar-info { font-size: 0.8rem; color: var(--text-light); white-space: nowrap; }

        /* ===== TABLE ===== */
        .obs-table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); }
        .obs-table thead { background: var(--primary); color: var(--white); }
        .obs-table th { padding: 10px 14px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; text-align: left; }
        .obs-table td { padding: 10px 14px; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
        .obs-table tbody tr { cursor: pointer; transition: background 0.1s; }
        .obs-table tbody tr:hover { background: #f5f8fc; }
        .obs-table tbody tr:last-child td { border-bottom: none; }
        .row-arrow { color: var(--border); font-size: 1rem; transition: color 0.15s; }
        .obs-table tbody tr:hover .row-arrow { color: var(--accent); }

        /* ===== PAGINATION ===== */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 16px 0; }
        .pagination button { padding: 7px 16px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); font-size: 0.85rem; font-family: inherit; cursor: pointer; color: var(--text); transition: all 0.15s; }
        .pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .pagination button:disabled { opacity: 0.4; cursor: default; }
        .pagination .page-info { font-size: 0.82rem; color: var(--text-light); }

        /* ===== EMPTY STATE ===== */
        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-light); }
        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { font-size: 0.9rem; }

        /* ===== LOADING ===== */
        .loading { text-align: center; padding: 48px 20px; color: var(--text-light); font-size: 0.9rem; }

        /* ===== DETAIL VIEW ===== */
        .detail-view { display: none; }
        .detail-view.active { display: block; }
        .list-view.hidden { display: none; }

        .back-to-list { display: inline-flex; align-items: center; gap: 6px; padding: 8px 0; font-size: 0.88rem; color: var(--accent); cursor: pointer; border: none; background: none; font-family: inherit; margin-bottom: 16px; }
        .back-to-list:hover { text-decoration: underline; }

        /* ===== REPORT CARD ===== */
        .report-card { background: var(--white); border-radius: 10px; box-shadow: var(--shadow); overflow: hidden; }
        .report-header { background: var(--primary); color: var(--white); padding: 24px 28px; text-align: center; }
        .report-header h2 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.3px; margin-bottom: 2px; }
        .report-header .report-ref { font-size: 0.75rem; opacity: 0.7; letter-spacing: 0.5px; }
        .report-header .report-company { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }

        .report-body { padding: 24px 28px; }
        .report-section { margin-bottom: 20px; }
        .report-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--primary); padding-bottom: 8px; border-bottom: 2px solid var(--primary); margin-bottom: 12px; }

        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .report-field { }
        .report-field.full { grid-column: 1 / -1; }
        .report-field-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-light); margin-bottom: 3px; }
        .report-field-value { font-size: 0.92rem; color: var(--text); line-height: 1.5; min-height: 1.4em; }
        .report-field-value.text-block { background: #f8f9fb; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; white-space: pre-wrap; }

        /* Type badge */
        .type-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.3px; }
        .type-badge.red { background: #fde8ea; color: var(--danger); }
        .type-badge.green { background: #e6f7ec; color: var(--success); }
        .type-badge.amber { background: #fff6e0; color: #b37400; }

        /* Action highlight */
        .action-highlight { border-left: 4px solid var(--warning); background: #fffcf0; padding: 12px 16px; border-radius: 0 6px 6px 0; margin-top: 8px; }
        .action-highlight.no-action { border-left-color: var(--success); background: #f0faf4; }

        .action-status { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 700; }
        .action-status.yes { background: #fde8ea; color: var(--danger); }
        .action-status.no { background: #e6f7ec; color: var(--success); }

        .salus-status { font-size: 0.82rem; color: var(--text-light); padding: 12px 0 0; border-top: 1px solid var(--border); margin-top: 16px; }
        .salus-status strong { color: var(--text); }

        /* ===== PRINT ===== */
        @media print {
            .topbar, .toolbar, .pagination, .back-to-list, .no-print { display: none !important; }
            body { background: #fff; }
            .content { max-width: 100%; padding: 0; }
            .report-card { box-shadow: none; border: 1px solid #ccc; }
            .report-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .report-grid { grid-template-columns: 1fr; }
            .obs-table th:nth-child(3), .obs-table td:nth-child(3) { display: none; }
            .report-body { padding: 16px; }
            .report-header { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1>SHEQ Observations &mdash; SF 013c</h1>
    <a href="sheq_hub.html">&larr; SHEQ Hub</a>
</div>

<div class="content">
    <!-- LIST VIEW -->
    <div class="list-view" id="listView">
        <div class="toolbar">
            <input type="text" class="search-box" id="searchBox" placeholder="Search observations...">
            <span class="toolbar-info" id="totalInfo"></span>
        </div>
        <div id="tableContainer">
            <div class="loading" id="loadingIndicator">Loading observations...</div>
        </div>
        <div class="pagination" id="pagination" style="display:none;">
            <button id="btnPrev" onclick="changePage(-1)">&larr; Previous</button>
            <span class="page-info" id="pageInfo"></span>
            <button id="btnNext" onclick="changePage(1)">Next &rarr;</button>
        </div>
    </div>

    <!-- DETAIL VIEW -->
    <div class="detail-view" id="detailView">
        <button class="back-to-list no-print" onclick="showList()">&larr; Back to list</button>
        <div id="reportContent"></div>
    </div>
</div>

<script>
(function() {
    // Auth check
    if (!localStorage.getItem('mii_token')) {
        window.location.href = 'hub.html';
        return;
    }

    var MII_API = 'https://mii-hub-api.azurewebsites.net/api';
    var authHeaders = { 'Authorization': 'Bearer ' + localStorage.getItem('mii_token') };

    var currentOffset = 0;
    var limit = 50;
    var totalCount = 0;
    var currentSearch = '';
    var debounceTimer = null;

    var searchBox = document.getElementById('searchBox');
    var tableContainer = document.getElementById('tableContainer');
    var loadingIndicator = document.getElementById('loadingIndicator');
    var pagination = document.getElementById('pagination');
    var pageInfo = document.getElementById('pageInfo');
    var btnPrev = document.getElementById('btnPrev');
    var btnNext = document.getElementById('btnNext');
    var totalInfo = document.getElementById('totalInfo');
    var listView = document.getElementById('listView');
    var detailView = document.getElementById('detailView');
    var reportContent = document.getElementById('reportContent');

    // Search with debounce
    searchBox.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function() {
            currentSearch = searchBox.value.trim();
            currentOffset = 0;
            loadList();
        }, 300);
    });

    function loadList() {
        loadingIndicator.style.display = 'block';
        pagination.style.display = 'none';

        var url = MII_API + '/sheq/audits?type=sheq&search=' + encodeURIComponent(currentSearch) + '&limit=' + limit + '&offset=' + currentOffset;

        fetch(url, { headers: authHeaders })
            .then(function(r) {
                if (!r.ok) throw new Error('API error ' + r.status);
                return r.json();
            })
            .then(function(data) {
                totalCount = data.total || 0;
                renderTable(data.audits || []);
                updatePagination();
            })
            .catch(function(err) {
                console.error('Failed to load observations:', err);
                tableContainer.innerHTML = '<div class="empty-state"><div class="empty-icon">!</div><p>Failed to load observations. Please try again.</p></div>';
                loadingIndicator.style.display = 'none';
            });
    }

    function renderTable(audits) {
        loadingIndicator.style.display = 'none';

        if (audits.length === 0) {
            tableContainer.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128269;</div><p>No observations found' + (currentSearch ? ' matching "' + escapeHtml(currentSearch) + '"' : '') + '</p></div>';
            return;
        }

        var html = '<table class="obs-table"><thead><tr>'
            + '<th>Date</th><th>Auditor</th><th>Location</th><th></th>'
            + '</tr></thead><tbody>';

        audits.forEach(function(a) {
            var dateStr = a.date ? formatDate(a.date) : '-';
            html += '<tr onclick="window._viewDetail(' + a.row + ')">'
                + '<td>' + escapeHtml(dateStr) + '</td>'
                + '<td>' + escapeHtml(a.auditor || '-') + '</td>'
                + '<td>' + escapeHtml(a.area || '-') + '</td>'
                + '<td><span class="row-arrow">&#8250;</span></td>'
                + '</tr>';
        });

        html += '</tbody></table>';
        tableContainer.innerHTML = html;
        totalInfo.textContent = totalCount + ' observation' + (totalCount !== 1 ? 's' : '');
    }

    function updatePagination() {
        if (totalCount <= limit) {
            pagination.style.display = 'none';
            return;
        }
        pagination.style.display = 'flex';
        var page = Math.floor(currentOffset / limit) + 1;
        var totalPages = Math.ceil(totalCount / limit);
        pageInfo.textContent = 'Page ' + page + ' of ' + totalPages;
        btnPrev.disabled = currentOffset === 0;
        btnNext.disabled = currentOffset + limit >= totalCount;
    }

    window.changePage = function(dir) {
        currentOffset += dir * limit;
        if (currentOffset < 0) currentOffset = 0;
        loadList();
        window.scrollTo(0, 0);
    };

    // Detail view
    window._viewDetail = function(row) {
        reportContent.innerHTML = '<div class="loading">Loading observation...</div>';
        listView.classList.add('hidden');
        detailView.classList.add('active');

        var url = MII_API + '/sheq/audit/sheq/' + row;

        fetch(url, { headers: authHeaders })
            .then(function(r) {
                if (!r.ok) throw new Error('API error ' + r.status);
                return r.json();
            })
            .then(function(data) {
                renderDetail(data);
            })
            .catch(function(err) {
                console.error('Failed to load detail:', err);
                reportContent.innerHTML = '<div class="empty-state"><div class="empty-icon">!</div><p>Failed to load observation detail.</p></div>';
            });
    };

    window.showList = function() {
        detailView.classList.remove('active');
        listView.classList.remove('hidden');
    };

    function renderDetail(data) {
        var f = data.fields || {};
        var obsType = f.type || '-';
        var typeClass = getTypeClass(obsType);
        var furtherAction = f.further_action_required || 'No';
        var isYes = furtherAction.toLowerCase() === 'yes';

        var html = '<div class="report-card">'
            + '<div class="report-header">'
            + '<h2>SHEQ OBSERVATION REPORT</h2>'
            + '<div class="report-ref">SF 013c</div>'
            + '<div class="report-company">MII Engineering</div>'
            + '</div>'
            + '<div class="report-body">';

        // Metadata
        html += '<div class="report-section">'
            + '<div class="report-section-title">Observation Details</div>'
            + '<div class="report-grid">'
            + field('Lead Auditor Name', data.auditor)
            + field('Type of Observation', '<span class="type-badge ' + typeClass + '">' + escapeHtml(obsType) + '</span>', true)
            + field('Date of Observation', formatDate(f.date || data.date))
            + field('Time of Observation', f.time || '-')
            + field('Location', f.location || '-', false, true)
            + '</div></div>';

        // Details
        html += '<div class="report-section">'
            + '<div class="report-section-title">Observation</div>'
            + '<div class="report-grid">'
            + field('Details of Observation', f.details || '-', false, true, true)
            + field('Immediate Action Taken', f.immediate_action || '-', false, true, true)
            + '</div></div>';

        // Further Action
        html += '<div class="report-section">'
            + '<div class="report-section-title">Further Action</div>'
            + '<div class="' + (isYes ? 'action-highlight' : 'action-highlight no-action') + '">'
            + '<div class="report-field" style="margin-bottom:8px;">'
            + '<div class="report-field-label">Further Action Required</div>'
            + '<span class="action-status ' + (isYes ? 'yes' : 'no') + '">' + escapeHtml(furtherAction) + '</span>'
            + '</div>';

        if (isYes && f.further_action_details) {
            html += '<div class="report-field">'
                + '<div class="report-field-label">Details of Further Action Required</div>'
                + '<div class="report-field-value">' + escapeHtml(f.further_action_details) + '</div>'
                + '</div>';
        }
        html += '</div></div>';

        // Footer - Salus
        html += '<div class="salus-status">Uploaded to Salus: <strong>' + escapeHtml(f.uploaded_to_salus || 'No') + '</strong></div>';

        html += '</div></div>';
        reportContent.innerHTML = html;
    }

    function field(label, value, isHtml, full, isBlock) {
        var cls = 'report-field' + (full ? ' full' : '');
        var valCls = 'report-field-value' + (isBlock ? ' text-block' : '');
        var val = isHtml ? value : escapeHtml(value || '-');
        return '<div class="' + cls + '">'
            + '<div class="report-field-label">' + escapeHtml(label) + '</div>'
            + '<div class="' + valCls + '">' + val + '</div>'
            + '</div>';
    }

    function getTypeClass(type) {
        if (!type) return 'amber';
        var t = type.toLowerCase();
        if (t.indexOf('near miss') !== -1 || t.indexOf('hazard') !== -1) return 'red';
        if (t.indexOf('positive') !== -1) return 'green';
        return 'amber';
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        try {
            var d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            var day = String(d.getDate()).padStart(2, '0');
            var mon = String(d.getMonth() + 1).padStart(2, '0');
            var year = d.getFullYear();
            return day + '/' + mon + '/' + year;
        } catch(e) {
            return dateStr;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.textContent = String(str);
        return div.innerHTML;
    }

    // Handle deep link: ?row=123
    var params = new URLSearchParams(window.location.search);
    var rowParam = params.get('row');
    if (rowParam) {
        window._viewDetail(parseInt(rowParam, 10));
    } else {
        loadList();
    }
})();
</script>
</body>
</html>
